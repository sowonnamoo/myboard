<div class="remote-control w-64 bg-gray-800 p-6 rounded-3xl shadow-2xl text-white">
    <h2 class="text-center font-bold mb-6 text-gray-400">시안 제어 리모컨</h2>
    
    <div class="space-y-4">
        <button onclick="updateSystemStatus('s1')" 
                id="btn-s1" class="w-full py-4 rounded-xl font-bold bg-gray-600 hover:bg-green-500 transition">
            1차 시안 배포 (S1)
        </button>
        
        <button onclick="updateSystemStatus('editing')" 
                id="btn-editing" class="w-full py-4 rounded-xl font-bold bg-gray-600 hover:bg-yellow-500 transition">
            수정 접수 모드 (Edit)
        </button>
        
        <button onclick="updateSystemStatus('initial')" 
                id="btn-initial" class="w-full py-4 rounded-xl font-bold bg-gray-600 hover:bg-red-500 transition">
            초기화 (Reset)
        </button>
    </div>
</div>

<style>
    /* 현재 상태 강조 효과 */
    .active-status { border: 3px solid white; box-shadow: 0 0 15px white; }
</style>

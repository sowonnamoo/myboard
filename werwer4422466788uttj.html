<!DOCTYPE html>
<html>
<head>
    <title>게시판 관리 시스템</title>
</head>
<body>
    <h2>게시글 작성</h2>
    <button onclick="savePost()">공지 및 업무 등록</button>

    <h2>데이터 관리 (일자별 삭제)</h2>
    <p>삭제 기준: 현재로부터 
        <input type="number" id="daysInput" value="360" style="width:60px;"> 
        일 지난 데이터 삭제 (0 입력 시 즉시 삭제)
    </p>
    <div>
        <button onclick="deleteOldPosts(1)">1번 데이터 삭제</button>
        <button onclick="deleteOldPosts(2)">2번 데이터 삭제</button>
        <button onclick="deleteOldPosts(3)">3번 데이터 삭제</button>
        <button onclick="deleteOldPosts(4)">4번 데이터 삭제</button>
    </div>

    <h2>게시판 목록 (최신 4개)</h2>
    <table border="1">
        <thead>
            <tr>
                <th>제목</th>
                <th>작성자</th>
                <th>상태</th>
                <th>테스트값</th>
                <th>작성일</th>
                <th>비밀번호</th>
            </tr>
        </thead>
        <tbody id="postList"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6ShVNtgLYEQZeyms88G-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const titles = [`테스트`, `공지메시지`];
        const authors = [`테스트`, `공지메시지`];
        const generatePassword = () => Math.random().toString(36).slice(-8);

        window.savePost = async () => {
            const data = {
                productName: titles[Math.floor(Math.random() * titles.length)],
                author: authors[Math.floor(Math.random() * authors.length)],
                password: generatePassword(),
                createdAt: new Date(),
                sian: "done",
                test: Math.floor(Math.random() * 4) + 1
            };
            await addDoc(collection(db, "boards"), data);
            alert(`등록 완료!\n테스트번호: ${data.test}`);
            loadPosts();
        };

        window.deleteOldPosts = async (testValue) => {
            const days = parseInt(document.getElementById('daysInput').value);
            if (isNaN(days)) {
                alert("정확한 일수를 입력해주세요.");
                return;
            }

            // 0일 설정 시 현재 시간 기준(아주 미세한 오차 보정 포함)으로 모든 데이터 삭제 대상
            const now = new Date();
            const thresholdDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));

            if (!confirm(`${testValue}번 데이터 중 ${days}일 지난 항목을 모두 삭제하시겠습니까?`)) return;

            const querySnapshot = await getDocs(collection(db, "boards"));
            let deleteCount = 0;

            for (const document of querySnapshot.docs) {
                const data = document.data();
                const createdAt = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt.seconds * 1000);

                // 0일일 경우 모든 데이터가 삭제되도록 조건문 수정
                // (createdAt <= now) 이므로 0일이면 무조건 삭제됨
                if (data.test === testValue && createdAt <= now && (days === 0 || createdAt < thresholdDate)) {
                    await deleteDoc(doc(db, "boards", document.id));
                    deleteCount++;
                }
            }
            alert(`${deleteCount}개의 데이터가 삭제되었습니다.`);
            loadPosts();
        };

        async function loadPosts() {
            const list = document.getElementById('postList');
            list.innerHTML = "";
            const q = query(collection(db, "boards"), orderBy("createdAt", "desc"), limit(4));
            const querySnapshot = await getDocs(q);

            querySnapshot.forEach((doc) => {
                const d = doc.data();
                const docId = doc.id;
                list.innerHTML += `<tr>
                    <td>${d.productName}</td>
                    <td>${d.author}</td>
                    <td>${d.sian}</td>
                    <td>${d.test || "-"}</td>
                    <td>${d.createdAt.toDate().toLocaleString()}</td>
                    <td>
                        <input type="password" id="input_${docId}" placeholder="비밀번호" style="width:80px">
                        <button onclick="checkPassword('${docId}', '${d.password}')">확인</button>
                    </td>
                </tr>`;
            });
        }

        window.checkPassword = (docId, realPassword) => {
            const inputField = document.getElementById(`input_${docId}`);
            if (inputField.value === realPassword) alert("인증 성공!");
            else alert("비밀번호가 틀렸습니다.");
        };

        loadPosts();
    </script>
</body>
</html>

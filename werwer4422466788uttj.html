            // 랜덤하게 선택

            const randomAuthor = authors[Math.floor(Math.random() * authors.length)];

                author: randomAuthor,
                password: generatePassword(),
                createdAt: new Date()
            };

        };

        async function loadPosts() {
            const list = document.getElementById('postList');
            list.innerHTML = "";
            const q = query(collection(db, "boards"), orderBy("createdAt", "desc"), limit(10));
            const querySnapshot = await getDocs(q);

            querySnapshot.forEach((doc) => {
                renderRow(doc, list);
            });
        }

        window.checkPassword = (docId, realPassword) => {
            const inputField = document.getElementById(`input_${docId}`);
            if (inputField.value === realPassword) {
                alert("인증 성공!");
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        };

            const d = doc.data();
            const docId = doc.id;
            list.innerHTML += `<tr>
                <td>${d.productName}</td>
                <td>${d.author}</td>
                <td>${d.createdAt.toDate().toLocaleString()}</td>

            </tr>`;
        }

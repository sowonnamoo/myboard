<!DOCTYPE html>
<html>
<head>
    <title>게시판 테스트</title>
</head>
<body>
    <h2>게시글 작성</h2>
    <!-- 입력창을 제거하고 버튼만 배치 -->
    <button onclick="savePost()">공지 및 업무 등록</button>

    <h2>게시판 목록</h2>
    <table border="1">
        <thead>
            <tr>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>비밀번호</th>
            </tr>
        </thead>
        <tbody id="postList"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6ShVNtgLYEQZeyms88G-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 랜덤 데이터 설정
        const titles = ["공지사항", "휴무안내", "업무일지", "회의록", "긴급요청"];
        const authors = ["관리자1", "업무팀", "김아영"];

        const generatePassword = () => Math.random().toString(36).slice(-8);

        window.savePost = async () => {
            // 랜덤하게 선택
            const randomTitle = titles[Math.floor(Math.random() * titles.length)];
            const randomAuthor = authors[Math.floor(Math.random() * authors.length)];

            const data = {
                productName: randomTitle,
                author: randomAuthor,
                password: generatePassword(),
                createdAt: new Date()
            };

            await addDoc(collection(db, "boards"), data);
            alert(`등록 완료!\n제목: ${data.productName}\n작성자: ${data.author}\n비밀번호: ${data.password}`);
            loadPosts();
        };

        async function loadPosts() {
            const list = document.getElementById('postList');
            list.innerHTML = "";
            const q = query(collection(db, "boards"), orderBy("createdAt", "desc"), limit(10));
            const querySnapshot = await getDocs(q);

            querySnapshot.forEach((doc) => {
                renderRow(doc, list);
            });
        }

        window.checkPassword = (docId, realPassword) => {
            const inputField = document.getElementById(`input_${docId}`);
            if (inputField.value === realPassword) {
                alert("인증 성공!");
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        };

        function renderRow(doc, list) {
            const d = doc.data();
            const docId = doc.id;
            list.innerHTML += `<tr>
                <td>${d.productName}</td>
                <td>${d.author}</td>
                <td>${d.createdAt.toDate().toLocaleString()}</td>
                <td>
                    <input type="password" id="input_${docId}" placeholder="비밀번호" style="width:80px">
                    <button onclick="checkPassword('${docId}', '${d.password}')">확인</button>
                </td>
            </tr>`;
        }

        loadPosts();
    </script>
</body>
</html>

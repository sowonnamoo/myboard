<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 조회 검색기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-5 bg-gray-50">
    <div class="max-w-2xl mx-auto">
     <div class="bg-white p-6 rounded shadow-sm mb-6">
    <h2 class="text-xl font-bold mb-4">주문 내역 조회</h2>
    
    <div class="mb-4 flex items-center justify-between text-sm text-gray-500">
        <span>* 인쇄 승인 완료된 주문만 조회 가능합니다.</span>
        <button onclick="window.location.href='index2.html'" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded text-xs font-bold">
            미승인 건 바로가기
        </button>
    </div>

    <div class="flex gap-2">
        <input type="text" id="search-name" class="border p-2 flex-grow rounded" placeholder="이름 입력">
        <input type="text" id="search-phone" class="border p-2 w-32 rounded" placeholder="전화번호 뒤 4자리" maxlength="4">
        <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded">조회</button>
    </div>
</div>
        <div id="results" class="space-y-4"></div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 팝업 열기 함수 추가
        window.openPopup = (url) => {
            window.open(url, '_blank', 'width=500,height=800,scrollbars=yes');
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

  document.getElementById('search-btn').addEventListener('click', async () => {
    const name = document.getElementById('search-name').value.trim();
    const phone = document.getElementById('search-phone').value.trim();
    const resultsDiv = document.getElementById('results');
    
    if (!name || phone.length !== 4) {
        alert("이름과 전화번호 뒷 4자리를 정확히 입력해주세요.");
        return;
    }

    resultsDiv.innerHTML = "조회 중...";

    try {
        const qBoards = query(collection(db, "boards"), where("author", "==", name));
        const qJjjj = query(collection(db, "jjjj"), where("author", "==", name));
        
        const [snapBoards, snapJjjj] = await Promise.all([getDocs(qBoards), getDocs(qJjjj)]);
        
        const allDocs = [
            ...snapBoards.docs.map(doc => ({ ...doc.data(), id: doc.id, isJajoo: false })),
            ...snapJjjj.docs.map(doc => ({ ...doc.data(), id: doc.id, isJajoo: true }))
        ];

        const filteredData = allDocs.filter(d => d.phone && d.phone.slice(-4) === phone);

        resultsDiv.innerHTML = "";
        if(filteredData.length === 0) { 
            resultsDiv.innerHTML = "해당하는 주문 정보를 찾을 수 없습니다."; 
            return; 
        }

        filteredData.forEach(d => {
            const dateObj = d.createdAt?.toDate ? d.createdAt.toDate() : new Date(d.createdAt);
            const phoneFull = (d.phone || "").replace(/[^0-9]/g, "");
            const phonePrefix = phoneFull.slice(0, -2);    
            const year = dateObj.getFullYear().toString().slice(-2);
            const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const day = dateObj.getDate().toString().padStart(2, '0');
            const hours = dateObj.getHours().toString().padStart(2, '0');
            const minutes = dateObj.getMinutes().toString().padStart(2, '0');
            
            const designNo = d.imgCode || `${phonePrefix}${year}${month}${day}${hours}${minutes}`;
            const dateStr = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일`;

            const reOrderBtn = d.isJajoo ? "" : `
                <button onclick="openPopup('index3.html?productName=${encodeURIComponent(d.author + '님 (' + (d.productName || '상품명') + '/' + (d.quantity || '0') + '/' + (d.size || '0') + ') ' + (d.price || '0') + '원')}&imgCode=${designNo}')" 
                class="bg-black text-white px-6 py-2 rounded font-bold">재구입</button>
            `;

            const isBankTransfer = d.status === '무통장';
            const isCard = d.status === '카드결제';
            
            const params = new URLSearchParams({
                product: d.productName || '상품명 없음', size: d.size || '0', qty: d.quantity || '0',
                price: d.price || '0', date: `작성일: ${dateStr}`, bizType: '기술서비스', bizItem: '광고, 대행'
            }).toString();

            const cardParams = new URLSearchParams({
                date: `${dateObj.getFullYear()}-${(dateObj.getMonth() + 1).toString().padStart(2, '0')}-${dateObj.getDate().toString().padStart(2, '0')}`,
                name: d.productName || '상품명 없음', size: d.size || '0', qty: d.quantity || '0', price: d.price || '0'
            }).toString();

            resultsDiv.innerHTML += `
                <div class="${d.isJajoo ? 'bg-orange-50' : 'bg-white'} border p-6 rounded shadow-sm mb-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="font-bold text-lg mb-2">${d.isJajoo ? '📦 [재주문/결제즉시 인쇄후 발송됩니다.] ' : ''}${d.productName || '상품명 없음'}</h2>
                            <div class="grid grid-cols-2 gap-2 text-sm text-gray-700">
                                <div><span class="font-semibold">작성자:</span> ${d.author}</div>
                                <div><span class="font-semibold">상태:</span> ${d.status || '-'}</div>
                                <div><span class="font-semibold">가격:</span> ${d.price || '-'}원</div>
                                <div><span class="font-semibold">수량:</span> ${d.quantity || '-'}개</div>
                                <div><span class="font-semibold">사이즈:</span> ${d.size || '-'}</div>
                                <div><span class="font-semibold">전화번호:</span> ${d.phone || '-'}</div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="openPopup('photo1.html?designNo=${designNo}')" 
                                    class="bg-green-600 text-white px-6 py-2 rounded font-bold">시안보기</button>
                            ${reOrderBtn}
                        </div>
                    </div>

                    <div class="mt-3 text-sm text-gray-600 border-t pt-3">
                        <div><span class="font-semibold">작성일:</span> ${dateStr}</div>
                        <div><span class="font-semibold">배송지:</span> ${d.address || '-'}</div>
                        <div><span class="font-semibold">메시지:</span> ${d.message || '-'}</div>
                        
                        <div class="mt-2 flex items-center gap-2">
                            <span class="font-semibold">첨부파일:</span>
                            ${d.file1Url ? `<a href="${d.file1Url}" target="_blank" class="text-blue-500 underline text-xs">파일 1</a>` : '<span class="text-gray-400 text-xs">없음</span>'}
                            ${d.file2Url ? `<a href="${d.file2Url}" target="_blank" class="text-blue-500 underline text-xs">파일 2</a>` : ''}
                        </div>

                        <div class="mt-2 text-sm font-semibold">시안 이미지번호 : ${designNo}</div>

                        <div class="mt-4 flex gap-2 flex-wrap">
                            <a href="javascript:void(0)" onclick="openPopup('https://sowonnamoo.github.io/myboard/segum')" class="border px-2 py-1 text-xs ${isBankTransfer ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">계산서/현금영수증</a>
                            <a href="javascript:void(0)" onclick="openPopup('https://sowonnamoo.github.io/myboard/print3.html?${params}')" class="border px-2 py-1 text-xs ${isBankTransfer ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">간이영수증</a>
                            <a href="javascript:void(0)" onclick="openPopup('https://sowonnamoo.github.io/myjs/gum')" class="border px-2 py-1 text-xs hover:bg-gray-100">운송장</a>
                            <a href="javascript:void(0)" onclick="openPopup('https://myboard-delta.vercel.app/cardf.html?${cardParams}')" class="border px-2 py-1 text-xs ${isCard ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">카드전표</a>
                        </div>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        console.error(error);
        resultsDiv.innerHTML = "오류가 발생했습니다.";
    }
        });
    </script>
</body>
</html>

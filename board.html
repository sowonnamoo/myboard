<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 파이어베이스 게시판</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        .form-box input, .form-box textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; }
        .form-box button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px; }
        .post { border-bottom: 1px solid #eee; padding: 15px 0; position: relative; }
        .post h3 { margin: 0 0 10px 0; }
        .post p { color: #555; white-space: pre-wrap; }
        .delete-btn { position: absolute; right: 10px; top: 15px; background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <h2>📝 무작정 따라하는 게시판</h2>

    <div class="form-box">
        <input type="text" id="title" placeholder="제목을 입력하세요">
        <textarea id="content" rows="4" placeholder="내용을 입력하세요"></textarea>
        <button id="save-btn">글쓰기</button>
    </div>

    <div id="posts-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 1단계에서 복사한 본인의 Firebase Config 내용을 여기에 붙여넣으세요!
        const firebaseConfig = {
    apiKey: "AIzaSyDU8d6ShVNtgLYEQZeyms88G-TDNnRd2aA",
    authDomain: "board-291e3.firebaseapp.com",
    projectId: "board-291e3",
    storageBucket: "board-291e3.firebasestorage.app",
    messagingSenderId: "25881766316",
    appId: "1:25881766316:web:c03e118cf26d3fff11b209"
  };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const boardsCollection = collection(db, "boards");

        // 1. 게시글 불러오기 함수
        async function loadPosts() {
            const postsList = document.getElementById("posts-list");
            postsList.innerHTML = "로딩 중...";

            // 최신글이 위로 오도록 정렬하여 가져오기
            const q = query(boardsCollection, orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            postsList.innerHTML = "";
            querySnapshot.forEach((documentSnapshot) => {
                const post = documentSnapshot.data();
                const id = documentSnapshot.id;

                const postHtml = `
                    <div class="post">
                        <h3>${post.title}</h3>
                        <p>${post.content}</p>
                        <button class="delete-btn" data-id="${id}">삭제</button>
                    </div>
                `;
                postsList.innerHTML += postHtml;
            });

            // 삭제 버튼 이벤트 연결
            document.querySelectorAll(".delete-btn").forEach(button => {
                button.addEventListener("click", async (e) => {
                    const docId = e.target.getAttribute("data-id");
                    if(confirm("정말 이 글을 삭제하시겠습니까?")) {
                        await deleteDoc(doc(db, "boards", docId));
                        loadPosts(); // 삭제 후 새로고침
                    }
                });
            });
        }

        // 2. 게시글 저장하기 이벤트
        document.getElementById("save-btn").addEventListener("click", async () => {
            const titleInput = document.getElementById("title");
            const contentInput = document.getElementById("content");

            if (!titleInput.value || !contentInput.value) {
                alert("제목과 내용을 모두 입력해주세요.");
                return;
            }

            try {
                await addDoc(boardsCollection, {
                    title: titleInput.value,
                    content: contentInput.value,
                    createdAt: new Date() // 생성 시간 저장
                });
                
                // 입력창 비우고 다시 로드
                titleInput.value = "";
                contentInput.value = "";
                loadPosts();
            } catch (error) {
                console.error("Error adding document: ", error);
            }
        });

        // 페이지 처음 켜졌을 때 글 목록 로드
        loadPosts();
    </script>
</body>
</html>

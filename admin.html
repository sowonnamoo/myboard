<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 전용 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow border">
        <h2 class="text-xl font-bold mb-4">🛠 관리자 도구</h2>
        <p class="text-sm text-gray-600 mb-6">30일이 지난 게시글의 개인정보(전화번호/주소)를 마스킹 처리합니다.</p>
        
        <button id="mask-info-btn" class="w-full bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700 transition">
            개인정보 일괄 마스킹 실행
        </button>
        
        <div id="status" class="mt-4 text-sm text-gray-500"></div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 접수</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .cart-item { background: #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🛒 장바구니</h2>
    <div id="cart-list"></div>
    <div id="total-price" style="font-weight:bold; margin: 10px 0;"></div>
    
    <input type="text" id="author" placeholder="성함"><br>
    <input type="tel" id="phone" placeholder="전화번호"><br>
    <input type="text" id="address" placeholder="주소"><br>
    <textarea id="message" placeholder="메시지"></textarea><br>
    <button onclick="submitOrder()">접수하기</button>

    <script src="app5.js" type="module"></script>
</body>
</html>

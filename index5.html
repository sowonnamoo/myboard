<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문작성 게시판 (PC 전용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

    <div class="w-[744px] mx-auto min-h-screen">
        
<header class="w-full flex justify-center pb-4">           <img src="https://sowonnamoo1005.cafe24.com/web/upload/2025/260602.jpg?234234" width="744" height="68" border="0" usemap="#Map" class="object-cover" onerror="this.style.display='none';">
            <map name="Map">
                <area shape="rect" coords="0,-1,211,57" href="https://sowonnamoo.github.io/myboard" target="_self">
                <area shape="rect" coords="211,-1,383,55" href="https://sowonnamoo.github.io/myboard/index2" target="_self">
                <area shape="rect" coords="383,-1,572,58" href="https://sowonnamoo.github.io/myboard/index5" target="_self">
                <area shape="rect" coords="572,-3,742,58" href="https://sowonnamoo.github.io/myboard/index6" target="_self">
            </map>
        </header>


        
<div class="w-[700px] mx-auto my-6">
    <h2 class="text-center text-xl font-bold mb-4 text-gray-800">제작상황</h2>
    <div class="flex w-full h-12 text-white font-bold text-sm">
        <div class="flex-1 flex items-center justify-center bg-sky-500 relative">
            접수/결제 완료
            <div class="absolute right-[-15px] top-0 border-t-[24px] border-t-transparent border-l-[15px] border-l-sky-500 border-b-[24px] border-b-transparent"></div>
        </div>
        <div class="flex-1 flex items-center justify-center bg-orange-400 relative ml-[15px]">
            인쇄승인 or 조판완료
            <div class="absolute right-[-15px] top-0 border-t-[24px] border-t-transparent border-l-[15px] border-l-orange-400 border-b-[24px] border-b-transparent"></div>
        </div>
        <div class="flex-1 flex items-center justify-center bg-lime-500 relative ml-[15px]">
            제작중(인쇄)
            <div class="absolute right-[-15px] top-0 border-t-[24px] border-t-transparent border-l-[15px] border-l-lime-500 border-b-[24px] border-b-transparent"></div>
        </div>
        <div class="flex-1 flex items-center justify-center bg-pink-500 ml-[15px]">
            출고(운송장등록)
        </div>
    </div>
    <p class="text-center text-sm text-gray-600 mt-4">
        납기일 : 각 제품별 카테고리 참고 / 휴일, 대체공휴일은 납기일에서 제외됩니다.
    </p>
</div>

        






        
        <div class="py-0">
            
<section id="view-list" class="space-y-4">
    <div class="border p-3 bg-gray-50 text-sm text-gray-600 rounded">








        
        <h2 class="text-xl font-bold mb-4">주문 내역 조회</h2>
    
    <div class="mb-4 flex items-center justify-between text-sm text-gray-500">
        <span>* 구입완료건 조회 / 제작상황</span>
  
    </div>

  <div class="flex gap-2">
    <input type="text" id="search-name" class="border p-2 flex-grow-[2] rounded" placeholder="이름 입력">
    
    <input type="text" id="search-phone" class="border p-2 w-48 rounded" placeholder="전화번호 뒤 4자리" maxlength="4">
    
    <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded">조회</button>
</div>
</div>
        <div id="results" class="space-y-4"></div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 팝업 열기 함수 추가
        window.openPopup = (url) => {
            window.open(url, '_blank', 'width=590,height=830,scrollbars=yes');
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

document.getElementById('search-btn').addEventListener('click', async () => {
    // [추가] 봇 방지 로직: 10회 실패 시 입력값 변조
    let failCount = parseInt(localStorage.getItem('searchFailCount') || '0');
    const phoneInput = document.getElementById('search-phone');
    if (failCount >= 15) {
        const randomDigit = Math.floor(Math.random() * 3) + 1;
        phoneInput.value = phoneInput.value.slice(0, -1) + randomDigit;
    }

    const name = document.getElementById('search-name').value.trim();
    const phone = phoneInput.value.trim(); // 수정된 phoneInput 값 사용
    const resultsDiv = document.getElementById('results');
    
    if (!name || phone.length !== 4) {
        // [추가] 입력 오류 시 카운트 증가
        localStorage.setItem('searchFailCount', parseInt(localStorage.getItem('searchFailCount') || '0') + 1);
        alert("이름과 전화번호 뒷 4자리를 정확히 입력해주세요.");
        return;
    }

    resultsDiv.innerHTML = "조회 중...";

    try {
        const qBoards = query(collection(db, "boards"), where("author", "==", name));
        const qJjjj = query(collection(db, "jjjj"), where("author", "==", name));
        
        const [snapBoards, snapJjjj] = await Promise.all([getDocs(qBoards), getDocs(qJjjj)]);
        
        const allDocs = [
            ...snapBoards.docs.map(doc => ({ ...doc.data(), id: doc.id, isJajoo: false })),
            ...snapJjjj.docs.map(doc => ({ ...doc.data(), id: doc.id, isJajoo: true }))
        ];

        const filteredData = allDocs.filter(d => d.phone && d.phone.slice(-4) === phone);

        if(filteredData.length === 0) {
            // [추가] 조회 결과 없을 시 카운트 증가
            localStorage.setItem('searchFailCount', parseInt(localStorage.getItem('searchFailCount') || '0') + 1);
            resultsDiv.innerHTML = "해당하는 주문 정보를 찾을 수 없습니다."; 
            return; 
        }

        // [추가] 성공 시 카운트 초기화
        localStorage.setItem('searchFailCount', '0');

        
filteredData.sort((a, b) => {
    const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
    const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
    return dateB - dateA;
});

        
        resultsDiv.innerHTML = "";
        if(filteredData.length === 0) { 
            resultsDiv.innerHTML = "해당하는 주문 정보를 찾을 수 없습니다."; 
            return; 
        }

        filteredData.forEach(d => {
            // [4] 날짜 및 이미지 번호 로직
            const dateObj = d.createdAt?.toDate ? d.createdAt.toDate() : new Date(d.createdAt);
            const phoneFull = (d.phone || "").replace(/[^0-9]/g, "");
            const phonePrefix = phoneFull.slice(0, -2);    
            const year = dateObj.getFullYear().toString().slice(-2);
            const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const day = dateObj.getDate().toString().padStart(2, '0');
            const hours = dateObj.getHours().toString().padStart(2, '0');
            const minutes = dateObj.getMinutes().toString().padStart(2, '0');
            
            const designNo = d.imgCode || `${phonePrefix}${year}${month}${day}${hours}${minutes}`;
            const dateStr = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일`;

            // [5] 재구입 버튼 노출 로직 (재주문 건이면 버튼 숨김)
            const reOrderBtn = d.isJajoo ? "" : `
                <button onclick="openPopup('index3.html?productName=${encodeURIComponent(d.author + '님 (' + (d.productName || '상품명') + '/' + (d.quantity || '0') + '/' + (d.size || '0') + ') ' + (d.price || '0') + '원')}&imgCode=${designNo}')" 
                class="bg-black text-white px-6 py-2 rounded font-bold">재구입</button>
            `;

            const isBankTransfer = d.status === '무통장';
            const isCard = d.status === '카드결제';
const isPending = d.status === '대기';
let statusLabel = (d.status === '대기') ? '(접수전/결제확인중)' : 
                  (d.status === '접수에러') ? '(제작보류)' : '(접수완료)';

// [추가된 로직] 시안 완료/출고 상태에 따른 문구 자동 변경
if (d.status !== '대기' && d.status !== '접수에러') {
    if (d.woonso1) {
        statusLabel += ' <span class="text-red-600 font-bold">_출고완료</span>';
    } else if (d.sian === 'done') {
        statusLabel += ' <span class="text-yellow-600 font-bold">_인쇄중</span>';
    }
}
            
            // [6] 영수증 파라미터 구성
            const params = new URLSearchParams({
                product: d.productName || '상품명 없음', size: d.size || '0', qty: d.quantity || '0',
                price: d.price || '0', date: `작성일: ${dateStr}`, bizType: '기술서비스', bizItem: '광고, 대행'
            }).toString();

            const cardParams = new URLSearchParams({
                date: `${dateObj.getFullYear()}-${(dateObj.getMonth() + 1).toString().padStart(2, '0')}-${dateObj.getDate().toString().padStart(2, '0')}`,
                name: d.productName || '상품명 없음', size: d.size || '0', qty: d.quantity || '0', price: d.price || '0'
            }).toString();

            // [7] HTML 렌더링 (누락된 항목 복구 완료)
          resultsDiv.innerHTML += `
    <div class="${d.isJajoo ? 'bg-orange-50' : 'bg-white'} border p-6 rounded shadow-sm mb-4">
        <div class="flex justify-between items-start">
            <div>
                <h2 class="font-bold text-lg mb-2">${d.isJajoo ? '📦 재주문_결제즉시 제작시작건_ ' : ''}${d.productName || '상품명 없음'}</h2>
                <div class="grid grid-cols-2 gap-2 text-sm text-gray-700">
                    <div><span class="font-semibold">작성자:</span> ${d.author}</div>
<div><span class="font-semibold">상태:</span> ${d.status || '-'} <span class="text-blue-600 font-bold">${statusLabel}</span></div>
<div><span class="font-semibold">가격:</span> ${d.price || '-'}원</div>
                    <div><span class="font-semibold">수량:</span> ${d.quantity || '-'}개</div>
                    <div><span class="font-semibold">사이즈:</span> ${d.size || '-'}</div>
                    <div><span class="font-semibold">전화번호:</span> ${d.phone || '-'}</div>
                </div>
            </div>
            <div class="flex flex-col gap-2">
            ${
    (!d.isJajoo && d.sian !== 'done') 
    ? `<button onclick="window.open('https://sowonnamoo.github.io/myboard/index2?autoId=${d.id}', '_blank', 'width=864,height=1000,scrollbars=yes')" 
               class="bg-yellow-500 text-white px-6 py-2 rounded font-bold">인쇄승인대기중</button>`
    : `<button onclick="openPopup('photo1.html?designNo=${designNo}')"
               class="bg-green-600 text-white px-6 py-2 rounded font-bold">확정시안</button>`
}
            ${reOrderBtn}
        </div>
        </div>

        <div class="mt-3 text-sm text-gray-600 border-t pt-3">
            <div><span class="font-semibold">작성일:</span> ${dateStr}</div>
            <div><span class="font-semibold">배송지:</span> ${d.address || '-'}</div>
            <div><span class="font-semibold">메시지:</span> ${d.message || '-'}</div>
            
       <div class="mt-2 flex items-center gap-2">
    <span class="font-semibold">첨부파일:</span>
    ${d.file1Url ? `<a href="${d.file1Url}" target="_blank" class="text-blue-500 underline text-xs">파일 1</a>` : '<span class="text-gray-400 text-xs">없음</span>'}
    ${d.file2Url ? `<a href="${d.file2Url}" target="_blank" class="text-blue-500 underline text-xs">파일 2</a>` : ''}
    
    ${d.status === '접수에러' ? `
        <button onclick="openPopup('upload.html?docId=${d.id}&col=${d.isJajoo ? 'jjjj' : 'boards'}')" 
        class="bg-red-500 text-white px-2 py-1 text-xs rounded hover:bg-red-600">파일재업로드</button>
    ` : ''}
</div>

<div class="mt-2 text-sm font-semibold">시안 이미지번호 : ${designNo}</div>

${
    d.status === '대기' 
    ? `<div class="mt-1 text-sm font-bold text-red-600 bg-red-50 p-2 rounded">
        *무통장 계좌 : 국민 782301-01-547234 에코그래픽스 ㅣ  * 농협 352-0130-9995-53 최대환 
       </div>` 
    : ''
}
            <div class="mt-4 flex gap-2 flex-wrap">
                <a href="javascript:void(0)" 
                   onclick="${isPending ? '' : "openPopup('https://sowonnamoo.github.io/myboard/segum')"}" 
                   class="border px-2 py-1 text-xs ${(isBankTransfer && !isPending) ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">계산서/현금영수증</a>
                
                <a href="javascript:void(0)" 
                   onclick="${isPending ? '' : "openPopup('https://sowonnamoo.github.io/myboard/print3.html?" + params + "')"}" 
                   class="border px-2 py-1 text-xs ${(isBankTransfer && !isPending) ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">간이영수증</a>
                
                <a href="javascript:void(0)" 
                   onclick="${isPending ? '' : "openPopup('https://myboard-delta.vercel.app/cardf.html?" + cardParams + "')"}" 
                   class="border px-2 py-1 text-xs ${(isCard && !isPending) ? 'hover:bg-gray-100' : 'bg-gray-100 text-gray-400 pointer-events-none'}">카드전표</a>
         
<a href="javascript:void(0)" 
   onclick="${d.woonso1 ? "openPopup('" + d.woonso1 + "')" : ""}"
   class="border px-2 py-1 text-xs transition-colors duration-300 
   ${d.woonso1 
       ? 'bg-red-500 text-white border-red-500 hover:bg-red-600 font-bold' 
       : 'bg-gray-100 text-gray-400 pointer-events-none'
   }">
   ${d.woonso1 ? '출고완료/운송장보기' : '운송장'}
</a>

${
    (d.status === '대기') 
    ? `<button onclick="deleteOrder('${d.id}', ${d.isJajoo})" 
        class="border px-2 py-1 text-xs bg-gray-500 text-white hover:bg-gray-700">주문삭제</button>`
    : ''
}      
                        
                        
                        
                        </div>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        console.error(error);
        resultsDiv.innerHTML = "조회 중 오류가 발생했습니다. 다시 시도해주세요.";
    }
        });

window.deleteOrder = async (docId, isJajoo) => {
    if (confirm("정말로 이 주문을 삭제하시겠습니까?")) {
        try {
            // isJajoo 값에 따라 컬렉션 경로를 다르게 설정
            const collectionName = isJajoo ? "jjjj" : "boards";
            await deleteDoc(doc(db, collectionName, docId));
            
            alert("삭제되었습니다.");
            document.getElementById('search-btn').click();
        } catch (error) {
            console.error("삭제 실패:", error);
            alert("삭제 중 오류가 발생했습니다.");
        }
    }
};
    
    </script>
</body>
</html>

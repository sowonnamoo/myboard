<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드 결제 진행</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm text-center">
        <h2 class="text-xl font-bold text-gray-800 mb-2">접수가 완료되었습니다.</h2>
        <p class="text-gray-500 text-sm mb-6">카드 결제를 진행해 주세요.</p>
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <p class="text-gray-600 text-xs uppercase tracking-wider mb-1">결제 금액</p>
            <p id="priceDisplay" class="text-3xl font-black text-blue-600">0원</p>
        </div>
        <button id="payBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700">카드결제 진행</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // 기존 firebaseConfig를 여기에 넣어주세요
        const firebaseConfig = { 
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

      const params = new URLSearchParams(window.location.search);
    const price = params.get('price');
    const orderId = params.get('orderId'); // 여기서 ID를 가져오고 있어야 합니다!

    document.getElementById('payBtn').onclick = function() {
        // [중요 수정] 결제창을 열 때 orderId를 URL 파라미터에 포함시킵니다.
        const payUrl = `https://sowonnamoo.github.io/myjs/payment?price=${price}&orderId=${orderId}`;
        const payWin = window.open(payUrl, '_blank', 'width=1000,height=700');
        
        window.addEventListener("message", async function listener(e) {
            // [중요 수정] 결제 성공 시 success4로 이동할 때도 orderId를 함께 넘깁니다.
            if (e.data === "paymentSuccess") {
                const targetUrl = `success4?price=${price}&orderId=${orderId}`;
                window.location.href = targetUrl;
                
                if (payWin) payWin.close();
                window.removeEventListener("message", listener);
            }
        });
    };
</script>
</body>
</html>

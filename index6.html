<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문작성 게시판 (PC 전용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen">

    <div class="w-full">
        <header class="w-full flex justify-center pb-4">
            <img src="https://sowonnamoo1005.cafe24.com/web/upload/2025/260602.jpg?234234" width="744" height="68" border="0" usemap="#Map" class="object-cover" onerror="this.style.display='none';">
            <map name="Map">
                <area shape="rect" coords="0,-1,211,57" href="https://sowonnamoo.github.io/myboard" target="_self">
                <area shape="rect" coords="211,-1,383,55" href="https://sowonnamoo.github.io/myboard/index2" target="_self">
                <area shape="rect" coords="383,-1,572,58" href="https://sowonnamoo.github.io/myboard/index5" target="_self">
                <area shape="rect" coords="572,-3,742,58" href="https://sowonnamoo.github.io/myboard/index6" target="_self">
            </map>
        </header>

        <div class="max-w-[744px] mx-auto p-6 space-y-8">
            
            <section class="bg-white border border-gray-200 p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">칼선 EPS 파일 생성기</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><label class="block text-sm font-medium text-gray-600 mb-1">가로 (mm)</label><input type="number" id="width_eps" value="100" class="w-full p-2 border border-gray-300 rounded outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-600 mb-1">세로 (mm)</label><input type="number" id="height_eps" value="100" class="w-full p-2 border border-gray-300 rounded outline-none"></div>
                </div>
                <button onclick="downloadEPS()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">CMYK EPS 다운로드</button>
            </section>

            <section class="bg-white border border-gray-200 p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">칼선 JPG (500 DPI) 생성기</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><label class="block text-sm font-medium text-gray-600 mb-1">가로 (mm)</label><input type="number" id="width_jpg" value="100" class="w-full p-2 border border-gray-300 rounded outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-600 mb-1">세로 (mm)</label><input type="number" id="height_jpg" value="100" class="w-full p-2 border border-gray-300 rounded outline-none"></div>
                </div>
                <button onclick="downloadJPG()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg">CMYK JPG 다운로드</button>
            </section>
        </div>
    </div>

    <script>
        function downloadEPS() {
            const w = parseFloat(document.getElementById('width_eps').value);
            const h = parseFloat(document.getElementById('height_eps').value);
            const f = 2.83465;
            const o = 3 * f;
            const tw = (w + 6) * f, th = (h + 6) * f;
            
            // 안쪽 테두리 붉은색(CMYK 0 1 1 0) 적용
            let eps = `%!PS-Adobe-3.0 EPSF-3.0\n%%BoundingBox: 0 0 ${tw} ${th}\n0.5 setlinewidth\n% 바깥 테두리 (검정)\n0 0 0 1 setcmykcolor\n0 0 moveto ${tw} 0 lineto ${tw} ${th} lineto 0 ${th} lineto closepath stroke\n% 안쪽 테두리 (빨강)\n0 1 1 0 setcmykcolor\n${o} ${o} moveto ${tw-o} ${o} lineto ${tw-o} ${th-o} lineto ${o} ${th-o} lineto closepath stroke\nshowpage`;
            
            const blob = new Blob([eps], {type: 'application/postscript'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'line_cmyk.eps';
            link.click();
        }

        function downloadJPG() {
            const w = parseFloat(document.getElementById('width_jpg').value);
            const h = parseFloat(document.getElementById('height_jpg').value);
            const dpi = 500;
            const pxW = Math.round((w + 6) * (dpi / 25.4));
            const pxH = Math.round((h + 6) * (dpi / 25.4));
            const offset = Math.round(3 * (dpi / 25.4));

            const canvas = document.createElement('canvas');
            canvas.width = pxW;
            canvas.height = pxH;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, pxW, pxH);
            ctx.lineWidth = Math.round(0.2 * (dpi / 25.4));
            
            // 바깥 테두리 (검정)
            ctx.strokeStyle = "black";
            ctx.strokeRect(0, 0, pxW, pxH);
            
            // 안쪽 테두리 (빨강)
            ctx.strokeStyle = "red";
            ctx.strokeRect(offset, offset, pxW - (offset * 2), pxH - (offset * 2));

            const link = document.createElement('a');
            link.download = 'line_cmyk.jpg';
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        }
    </script>



    
<script>
        // 우클릭 차단
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        }, false);

        // EPS 다운로드 로직
        function downloadEPS() {
            // ... (기존 코드)
        }

        // JPG 다운로드 로직
        function downloadJPG() {
            // ... (기존 코드)
        }
    </script>






    
</body>
</html>

<!DOCTYPE html><html lang="ko"><head>    <meta charset="UTF-8">    <title>CMYK EPS 테두리 생성기</title></head><body>    <div style="max-width: 400px; margin: auto; padding: 20px;">        <h2>CMYK EPS 생성기</h2>        <label>가로 (mm): <input type="number" id="width" value="100"></label><br>        <label>세로 (mm): <input type="number" id="height" value="100"></label><br><br>        <button onclick="downloadEPS()" style="padding: 10px 20px; cursor: pointer;">CMYK EPS 다운로드</button>    </div>    <script>        function downloadEPS() {            const w_mm = parseFloat(document.getElementById('width').value);            const h_mm = parseFloat(document.getElementById('height').value);            const factor = 2.83465;            const totalW_pt = (w_mm + 8) * factor;            const totalH_pt = (h_mm + 8) * factor;            const offset = 2 * factor;            // CMYK 검정(0 0 0 1) 설정과 선 두께(0.5pt) 추가            let eps = `%!PS-Adobe-3.0 EPSF-3.0%%BoundingBox: 0 0 ${totalW_pt} ${totalH_pt}%%Creator: CMYK EPS Generator%%EndComments0.5 setlinewidth0 0 0 1 setcmykcolor% 첫 번째 테두리0 0 moveto${totalW_pt} 0 lineto${totalW_pt} ${totalH_pt} lineto0 ${totalH_pt} linetoclosepathstroke% 두 번째 테두리${offset} ${offset} moveto${totalW_pt - offset} ${offset} lineto${totalW_pt - offset} ${totalH_pt - offset} lineto${offset} ${totalH_pt - offset} linetoclosepathstrokeshowpage%%EOF`;            const blob = new Blob([eps], {type: 'application/postscript'});            const link = document.createElement('a');            link.href = URL.createObjectURL(blob);            link.download = 'frame_cmyk.eps';            link.click();        }    </script></body></html>

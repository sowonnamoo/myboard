<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>카드 결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-[400px] bg-white p-8 rounded-2xl shadow-lg text-center">
        <h2 class="text-xl font-bold text-gray-800 mb-6">💳 결제 진행</h2>
        
        <div class="py-6 border-y border-gray-100 mb-6">
            <p class="text-sm text-gray-500 mb-2">결제하실 금액</p>
            <div id="total-price" class="text-3xl font-bold text-blue-600">0원</div>
        </div>

        <button onclick="goCard()" class="w-full py-4 bg-blue-900 text-white font-bold rounded-xl hover:bg-blue-800 transition">
            결제하기
        </button>
        
        <button onclick="window.history.back()" class="w-full mt-3 py-2 text-gray-400 text-sm hover:text-gray-600">
            뒤로가기
        </button>
    </div>

    <script>
        const WORKER_URL = "https://proud-math-2d41.ecogr.workers.dev/"; 
        const total = Number(localStorage.getItem("totalAmount")) || 0;
        document.getElementById("total-price").innerText = total.toLocaleString() + "원";

        async function goCard(){
            if(total <= 0) {
                alert("결제할 금액이 없습니다.");
                return;
            }

            try {
                // 1. 서버에서 키값 가져오기
                const res = await fetch(WORKER_URL);
                const data = await res.json();
                const paymentId = "PAY_" + Date.now();

                // 2. 결제창 호출
                const response = await PortOne.requestPayment({
                    storeId: data.STORE_ID,
                    channelKey: data.CHANNEL_KEY_CARD,
                    paymentId: paymentId,
                    orderName: "주문상품 결제",
                    totalAmount: total,
                    currency: "KRW",
                    payMethod: "CARD"
                });

                // 3. 결제 결과가 response에 담겨옵니다.
                // 결제 성공 시 response.code가 없거나 null입니다.
                if(response.code != null){
                    alert("결제 실패: " + response.message);
                    return;
                }

                // 4. 성공 시 결제ID를 확보하고 페이지 이동
                const successPaymentId = response.paymentId || paymentId;
                
                alert(total.toLocaleString() + "원이 결제되었습니다.\n확인 후 시안이 등록됩니다.");
                
                // 페이지 이동 (강제적으로 이동 수행)
                window.location.href = "success.html?paymentId=" + successPaymentId;

            } catch(error) {
                console.error("결제 에러:", error);
                alert("결제 처리 중 문제가 발생했습니다. 관리자에게 문의하세요.");
            }
        }
    </script>
</body>
</html>

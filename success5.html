<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">결제 처리 중입니다...</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Firebase 설정 (board-291e3 프로젝트 전용)
        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

       async function processPaymentStatus() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId'); // 이제 여기서 ID를 제대로 받습니다.

        if (!orderId) {
            document.getElementById("status-text").innerText = "결제 정보 오류 (ID 없음)";
            return;
        }

        try {
            // boards 또는 jjjj 컬렉션에서 해당 orderId 찾기
            const docRefBoards = doc(db, "boards", orderId);
            const docRefJjjj = doc(db, "jjjj", orderId);
            
            // 병렬로 확인하거나 하나씩 확인
            let docSnap = await getDoc(docRefBoards);
            let finalDocRef = docRefBoards;

            if (!docSnap.exists()) {
                docSnap = await getDoc(docRefJjjj);
                finalDocRef = docRefJjjj;
            }

            if (docSnap.exists()) {
                await updateDoc(finalDocRef, { status: "카드결제" });
                document.getElementById("status-text").innerText = "결제가 완료되었습니다!";
                // ... (이후 닫기 로직)
            }
        } catch (err) {
            console.error(err);
        }
    }
    processPaymentStatus();
</script>
</body>
</html>

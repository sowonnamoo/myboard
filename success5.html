<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">결제 처리 중...</h2>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    async function processPaymentStatus() {
        const statusText = document.getElementById("status-text");
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId');

        if (!orderId) {
            statusText.innerText = "결제 정보 오류 (ID 누락)";
            return;
        }

        try {
            // [수정] 오직 'jjjj' 컬렉션만 참조
            const docRef = doc(db, "jjjj", orderId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                await updateDoc(docRef, { status: "카드결제" });
                statusText.innerText = "결제가 완료되었습니다!";
                
                // 부모창 새로고침
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
                
                // 창 닫기
                setTimeout(() => window.close(), 1500);
            } else {
                statusText.innerText = "주문 정보를 찾을 수 없습니다 (jjjj 컬렉션 데이터 확인 필요)";
                console.error("해당 ID로 jjjj 컬렉션에서 문서를 찾지 못했습니다:", orderId);
            }

        } catch (err) {
            console.error("업데이트 에러:", err);
            statusText.innerText = "오류 발생: " + err.message;
        }
    }

    processPaymentStatus();
</script>
</body>
</html>

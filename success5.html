<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">결제 처리 중...</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        async function processPaymentStatus() {
            const statusText = document.getElementById("status-text");
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');

            if (!orderId) {
                statusText.innerText = "ID 없음";
                return;
            }

            try {
                // 1. 'jjjj' 컬렉션에서 문서 찾기
                const docRef = doc(db, "jjjj", orderId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    // 2. 상태 업데이트
                    await updateDoc(docRef, { status: "카드결제" });
                    statusText.innerText = "결제가 완료되었습니다!";
                } else {
                    // 3. 만약 'jjjj'에 없으면 'boards'도 확인 (혹시 모를 경우 대비)
                    const boardRef = doc(db, "boards", orderId);
                    await updateDoc(boardRef, { status: "카드결제" });
                    statusText.innerText = "결제가 완료되었습니다!";
                }

                // 4. 부모창 새로고침 및 닫기
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
                setTimeout(() => window.close(), 1500);

            } catch (err) {
                console.error("업데이트 에러:", err);
                statusText.innerText = "결제 전송 완료 (자동 반영됨)";
            }
        }

        processPaymentStatus();
    </script>
</body>
</html>

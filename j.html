<!DOCTYPE html>
<html>
<head>
    <title>게시판 테스트</title>
</head>
<body>
    <h2>게시글 작성</h2>
    <input type="text" id="productName" placeholder="제목">
    <input type="text" id="author" placeholder="작성자">
    <button onclick="savePost()">글쓰기</button>

    <h2>게시판 목록</h2>
    <table border="1">
        <thead>
            <tr>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
<th>비밀번호</th> </tr>
            </tr>
        </thead>
<tbody id="postList"></tbody>
</table>

<div style="text-align: center; margin-top: 10px;">
    <button onclick="loadMore()" style="font-size: 20px;">⬇ 더보기</button>
</div>

    <script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";




        // 본인의 파이어베이스 설정값으로 교체하세요
  const firebaseConfig = {
    apiKey: "AIzaSyDU8d6ShVNtgLYEQZeyms88G-TDNnRd2aA",
    authDomain: "board-291e3.firebaseapp.com",
    projectId: "board-291e3",
    storageBucket: "board-291e3.firebasestorage.app",
    messagingSenderId: "25881766316",
    appId: "1:25881766316:web:c03e118cf26d3fff11b209"
  };




        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 랜덤 비밀번호 생성
        const generatePassword = () => Math.random().toString(36).slice(-8);

        // 글 저장
        window.savePost = async () => {
            const data = {
                productName: document.getElementById('productName').value,
                author: document.getElementById('author').value,
                password: generatePassword(),
                createdAt: new Date()
            };
            await addDoc(collection(db, "boards"), data);
            alert("저장 완료! 비밀번호: " + data.password);
            loadPosts();
        };









// 목록 불러오기 (첫 페이지)
async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = "";
    
    // limit(5)를 추가하여 5개만 가져오도록 설정
    const q = query(collection(db, "boards"), orderBy("createdAt", "desc"), limit(5));
    const querySnapshot = await getDocs(q);
    
    // 다음 페이지를 위해 마지막 문서 저장
    lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];

    querySnapshot.forEach((doc) => {
        renderRow(doc, list);
    });
}


// 비밀번호 검증 함수 (스크립트 하단에 추가)
window.checkPassword = (docId, realPassword) => {
    const inputField = document.getElementById(`input_${docId}`);
    const inputPassword = inputField.value;
    
    // 횟수와 마지막 시도 시간을 저장할 키
    const failCountKey = `failCount_${docId}`;
    const lastTimeKey = `lastTime_${docId}`;
    
    let failCount = parseInt(localStorage.getItem(failCountKey) || "0");
    let lastTime = parseInt(localStorage.getItem(lastTimeKey) || "0");
    const currentTime = new Date().getTime();

    // 1시간(3600,000 밀리초)이 지났는지 확인
    if (failCount >= 15 && (currentTime - lastTime < 3600000)) {
        alert("15회 이상 틀려 접근이 차단되었습니다.");
        return;
    } else if (failCount >= 15 && (currentTime - lastTime >= 3600000)) {
        // 시간이 지났으면 초기화
        failCount = 0;
        localStorage.removeItem(failCountKey);
    }

    if (inputPassword === realPassword) {
        alert("인증 성공!");
        localStorage.removeItem(failCountKey);
    } else {
        failCount++;
        localStorage.setItem(failCountKey, failCount);
        localStorage.setItem(lastTimeKey, currentTime); // 마지막 시도 시간 기록
        alert(`비밀번호가 틀렸습니다. (${failCount}/15회)`);
    }
};

        loadPosts();
function renderRow(doc, list) {
    const d = doc.data();
    const docId = doc.id;
    list.innerHTML += `<tr>
        <td>${d.productName}</td>
        <td>${d.author}</td>
        <td>${d.createdAt.toDate().toLocaleString()}</td>
        <td>
            <input type="password" id="input_${docId}" placeholder="비밀번호" style="width:80px">
            <button onclick="checkPassword('${docId}', '${d.password}')">확인</button>
        </td>
    </tr>`;
}
    </script>
</body>
</html>

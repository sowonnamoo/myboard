<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트원 결제 테스트</title>

    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>

    <button id="payBtn">결제창 띄우기</button>

    <script>
        // IMP를 새로 선언하지 않고 바로 사용
        window.IMP.init("imp00024386");

        document.getElementById("payBtn").addEventListener("click", async () => {

            try {
                console.log("주문번호 요청 시작");

                const response = await fetch(
                    "https://proud-math-2d41.ecogr.workers.dev/",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error("서버 응답 오류: " + response.status);
                }

                const data = await response.json();

                console.log("서버 응답:", data);

                if (!data.merchant_uid) {
                    alert("merchant_uid가 없습니다.");
                    return;
                }

                console.log("결제창 호출");

                window.IMP.request_pay(
                    {
                        pg: "kcp.IP801",
                        pay_method: "card",
                        merchant_uid: data.merchant_uid,
                        name: "테스트 결제",
                        amount: 100,
                        buyer_name: "홍길동",
                        buyer_tel: "01012345678"
                    },
                    function (rsp) {

                        console.log("결제 결과:", rsp);

                        if (rsp.success) {
                            alert("결제 성공");
                        } else {
                            alert("결제 실패\n" + rsp.error_msg);
                        }
                    }
                );

            } catch (err) {
                console.error(err);
                alert("오류 발생: " + err.message);
            }
        });
    </script>

</body>
</html>

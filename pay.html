<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 테스트 (V1)</title>
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>

    <h1>100원 결제 테스트</h1>
    <button onclick="requestPay()">100원 결제하기</button>

    <script>
        // 1. 포트원 초기화
        const IMP = window.IMP;
        IMP.init("imp00024386"); // 본인의 포트원 가맹점 식별코드

        function requestPay() {
            // 2. 결제 요청
            IMP.request_pay({
                pg: "kcp", // KCP PG사 지정
                pay_method: "card",
                merchant_uid: "test_" + new Date().getTime(), // 주문번호는 매번 달라야 함
                name: "100원 테스트 결제",
                amount: 100, // 고정 100원
                buyer_email: "test@example.com",
                buyer_name: "테스터",
                buyer_tel: "010-1234-5678"
            }, (rsp) => {
                if (rsp.success) {
                    alert("결제 성공! 주문번호: " + rsp.merchant_uid);
                } else {
                    alert("결제 실패: " + rsp.error_msg);
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>

<button onclick="pay()">결제 테스트</button>

<script>
window.IMP.init("네_가맹점식별코드");

function pay() {
    window.IMP.request_pay({
        pg: "html5_inicis",
        pay_method: "card",
        merchant_uid: "test_" + Date.now(),
        name: "테스트상품",
        amount: 100
    }, function(rsp) {
        console.log(rsp);
        alert(JSON.stringify(rsp));
    });
}
</script>

</body>

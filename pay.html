<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>
    <button id="payBtn">결제창 띄우기</button>

    <script>
        const IMP = window.IMP;
        IMP.init("imp00024386");

        document.getElementById("payBtn").addEventListener("click", () => {
            IMP.request_pay({
                pg: "kcp.IP801",
                pay_method: "card",
                merchant_uid: "test_" + new Date().getTime(),
                name: "테스트 결제",
                amount: 100
            }, (rsp) => {
                if (rsp.success) alert("성공");
                else alert("실패: " + rsp.error_msg);
            });
        });
    </script>
</body>
</html>

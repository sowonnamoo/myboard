<script src="https://cdn.iamport.kr/v1/iamport.js"></script>

<input type="number" id="amountInput" placeholder="결제 금액 입력">
<button onclick="requestPay()">구입하기</button>

<script>
  const IMP = window.IMP;
  IMP.init("imp00024386"); // 포트원 관리자 페이지에서 복사한 '가맹점 식별코드' 입력

  async function requestPay() {
    const amount = document.getElementById("amountInput").value;
    
    // 1. 서버(Cloudflare Worker) 호출
    const response = await fetch("https://proud-math-2d41.ecogr.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: parseInt(amount) })
    });
    const { merchant_uid } = await response.json();

    // 2. 포트원 결제창 띄우기
    IMP.request_pay({
      pg: "kcp",
      pay_method: "card",
      merchant_uid: merchant_uid,
      name: "상품 결제",
      amount: amount,
      buyer_email: "test@example.com",
    }, (rsp) => {
      if (rsp.success) {
        alert("결제가 완료되었습니다.");
      } else {
        alert("결제 실패: " + rsp.error_msg);
      }
    });
  }
</script>

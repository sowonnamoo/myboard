<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드전표 신청 시스템</title>
    <style>
        /* 테두리선(border)을 제거하고, 필요에 따라 여백 등을 조정함 */
        .box { width: 450px; height: 600px; margin: 20px auto; padding: 30px; background: white; box-sizing: border-box; display: flex; flex-direction: column; }
        input { width: 100%; padding: 12px; margin: 3px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; margin-top: 5px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-search { background: #007bff; }
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        .btn-tab { flex: 1; padding: 15px 5px; border: 1px solid #333; background: #333; color: white; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; font-weight: bold; }
        .btn-tab.right { background: #4a4a4a; border-color: #4a4a4a; }
        .hidden { display: none; }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .save-btn { background: #9acd32; color: #000; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3>신청된 카드전표 정보 조회</h3>
    <input type="text" id="searchPhone" placeholder="전화번호(11자리) 입력">
    <button class="btn-main btn-search" onclick="searchData()">조회하기</button>
    <div id="resultList" style="margin: 10px 0; overflow-y: auto;"></div>

    <div class="btn-group">
        <button class="btn-tab" onclick="printReceipt()">카드결제내역서<br>(즉시발급)</button>
        <button class="btn-tab right" onclick="toggleApplyForm()">카드전표 영수증<br>신청</button>
    </div>

    <div id="applyForm" class="hidden">
        <input type="hidden" id="docId"> 
        <h3 style="color: #000080; border-bottom: 2px solid #000080; padding-bottom: 5px;">카드전표 자동발급 신청</h3>
        <input type="text" id="applyName" placeholder="제품 결제시 작성한 성함">
        <input type="text" id="applyPhone" placeholder="제품 결제시 작성한 전화번호">
        <input type="email" id="applyEmail" placeholder="영수증 수령 이메일주소 입력">
        <p style="font-size: 12px; color: #000080; margin: 15px 0; line-height: 1.5; text-align: center;">
            최초 1회 입력후 저장하면 차후 카드 결제시<br>
            매번 전표를 신청후 저장하실 필요 없으며<br>
            매주 금요일 입력하신 이메일로 자동 발행 발송 됩니다.<br>
            단 제품 결제시 작성한 성함과 전화번호는 반드시 늘 일치해야 합니다.
        </p>
        <button class="save-btn" onclick="saveCardData()">저장 / 수정</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COLLECTION = "cardjun1";

    window.toggleApplyForm = () => document.getElementById('applyForm').classList.toggle('hidden');

    window.printReceipt = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date') || '2026-06-11';
        const name = urlParams.get('name') || '상품명';
        const size = urlParams.get('size') || '규격';
        const qty = urlParams.get('qty') || '0';
        const price = urlParams.get('price') || '0';

        const url = `cardh.html?date=${date}&name=${encodeURIComponent(name)}&size=${size}&qty=${qty}&price=${price}`;
        window.open(url, '_blank', 'width=500,height=850');
    };

    window.saveCardData = async () => {
        const name = document.getElementById('applyName').value.trim();
        const phone = document.getElementById('applyPhone').value.trim();
        const email = document.getElementById('applyEmail').value.trim();
        const docIdEl = document.getElementById('docId');
        const id = docIdEl ? docIdEl.value : ""; 

        if (!name || !phone || !email) {
            alert('성함, 전화번호, 이메일은 필수 입력 항목입니다.');
            return;
        }

        const data = { name, phone, email };
        try {
            if (id) {
                await updateDoc(doc(db, COLLECTION, id), data);
                alert('수정 완료!');
            } else {
                await addDoc(collection(db, COLLECTION), data);
                alert('저장 완료!');
            }
            location.reload();
        } catch (e) {
            alert('저장 중 오류 발생: ' + e.message);
        }
    };

    window.searchData = async () => {
        const phone = document.getElementById('searchPhone').value;
        const q = query(collection(db, COLLECTION), where("phone", "==", phone));
        const snapshot = await getDocs(q);
        const list = document.getElementById('resultList');
        list.innerHTML = '';
        
        // 정보가 없는 경우 메시지 출력
        if (snapshot.empty) {
            list.innerHTML = '<div style="color:red; text-align:center; padding:10px; font-size:13px;">등록되지 않은 정보입니다.<br>카드전표 영수증 신청 클릭후 저장해주세요.</div>';
            return;
        }

        snapshot.forEach(d => {
            const data = d.data();
            const dataStr = JSON.stringify(data).replace(/"/g, "&quot;");
            list.innerHTML += `<div class="item">
                ${data.name} (${data.phone})
                <div>
                    <button onclick="editData('${d.id}', ${dataStr})">조회</button>
                    <button onclick="deleteData('${d.id}')">삭제</button>
                </div>
            </div>`;
        });
    };

    window.editData = (id, data) => {
        document.getElementById('docId').value = id;
        document.getElementById('applyName').value = data.name;
        document.getElementById('applyPhone').value = data.phone;
        document.getElementById('applyEmail').value = data.email;
        document.getElementById('applyForm').classList.remove('hidden');
    };

    window.deleteData = async (id) => {
        if(confirm('삭제하시겠습니까?')) { await deleteDoc(doc(db, COLLECTION, id)); searchData(); }
    };
</script>
</body>
</html>

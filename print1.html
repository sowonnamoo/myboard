<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문서 출력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: none; }
            .a4-page { width: 210mm; height: 297mm; margin: 0; border: none !important; }
        }
        .a4-page { width: 210mm; height: 297mm; padding: 20mm; background: white; margin: 20px auto; border: 1px solid #e5e7eb; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="a4-page" id="printable">
        <div class="flex-grow">
            <div id="doc-header" class="text-center py-8 mb-12 border-2 border-black transition-all bg-gray-200">
                <h1 id="doc-title" class="text-5xl font-bold tracking-widest">견 적 서</h1>
            </div>

            <table class="w-full border-collapse border border-black mb-10 table-fixed">
                <thead class="bg-gray-100">
                    <tr class="h-16">
                        <th class="border border-black p-4 w-1/3">품목</th>
                        <th class="border border-black p-4 w-2/15">규격</th>
                        <th class="border border-black p-4 w-2/15">수량</th>
                        <th class="border border-black p-4 w-2/15">금액</th>
                        <th class="border border-black p-4 w-2/15">부가세</th>
                        <th class="border border-black p-4 w-2/15">합계</th>
                    </tr>
                </thead>
                <tbody id="print-tbody">
                    </tbody>
            </table>
        </div>

        <div class="relative text-center pb-4">
            <div class="absolute -top-16 right-10 w-32 h-32 flex items-center justify-center">
                <img src="https://sowonnamoo1005.cafe24.com/1/2606011.png" alt="인감" class="w-full h-full object-contain rotate-[-15deg]">
            </div>
            <div class="text-xl font-bold space-y-2 border-t border-gray-300 pt-6">
                <p>입금계좌: 국민은행 000-000-000000 / 농협 000-000-000000</p>
                <p>상호: $$$ 회사</p>
                <p>발행일자: <span id="print-date"></span></p>
            </div>
        </div>
    </div>

    <script>
        // 1. URL 데이터 파싱
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'estimate';
        const product = params.get('product') || '-';
        const size = params.get('size') || '-';
        const qty = params.get('qty') || '0';
        const price = params.get('price') || '0';

        // 2. 제목/디자인 설정
        const header = document.getElementById('doc-header');
        const title = document.getElementById('doc-title');
        if(type === 'estimate') {
            title.innerText = "견 적 서";
            header.className = "text-center py-8 mb-12 border-2 border-black bg-gray-200 transition-all";
        } else {
            title.innerText = "거 래 명 세 서";
            header.className = "text-center py-8 mb-12 border-2 border-black bg-white transition-all";
        }

      // 3. 테이블 데이터 주입 (계산 로직 및 굵은 글씨/단위 추가)
const totalAmount = parseInt(price) || 0; 
const supplyPrice = Math.floor(totalAmount / 1.1);
const tax = totalAmount - supplyPrice;

const tbody = document.getElementById('print-tbody');
tbody.innerHTML = `
    <tr class="h-12 text-center">
        <td class="border border-black">${product}</td>
        <td class="border border-black">${size}</td>
        <td class="border border-black">${qty}</td>
        <td class="border border-black">${supplyPrice.toLocaleString()}</td>
        <td class="border border-black">${tax.toLocaleString()}</td>
        <td class="border border-black font-bold">${totalAmount.toLocaleString()}원</td>
    </tr>
`;

// 나머지 빈 행 채우기 (5개)
for(let i=0; i<5; i++) {
    tbody.innerHTML += `<tr class="h-12"><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td></tr>`;
}

        document.getElementById('print-date').innerText = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

        // 4. 자동 인쇄
        window.onload = () => { setTimeout(window.print, 500); };
    </script>
</body>
</html>

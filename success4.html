<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">결제 처리 중입니다...</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Firebase 설정 (board-291e3 프로젝트 전용)
        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processPaymentStatus() {
            const statusText = document.getElementById("status-text");
            const price = new URLSearchParams(window.location.search).get('price');

            if (!price) {
                statusText.innerText = "결제 정보 오류";
                return;
            }

            try {
                // 1. 상태가 '대기'인 문서들 조회
                const q = query(collection(db, "boards"), where("status", "==", "대기"));
                const querySnapshot = await getDocs(q);

                let found = false;
                
                // 2. 가격 비교 및 업데이트
                for (const doc of querySnapshot.docs) {
                    if (String(doc.data().price) === String(price)) {
                        await updateDoc(doc.ref, { status: "카드결제" });
                        found = true;
                        break;
                    }
                }

                if (found) {
                    statusText.innerText = "결제가 완료되었습니다!";
                    
                    // 3. 부모창 새로고침 후 닫기
                    if (window.opener && !window.opener.closed) {
                        window.opener.location.reload();
                    }
                    setTimeout(() => window.close(), 1000);
                } else {
                    statusText.innerText = "결제전송완료";
                }
            } catch (err) {
                console.error(err);
                statusText.innerText = "결제전송완료";
            }
        }

        // 실행
        processPaymentStatus();
    </script>
</body>
</html>

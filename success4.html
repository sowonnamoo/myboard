<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center text-white">
    <h2 id="status-text" class="text-xl font-bold">결제 처리 중입니다...</h2>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // ... (firebaseConfig 및 초기화 동일)

    async function processPaymentStatus() {
        const statusText = document.getElementById("status-text");
        const price = new URLSearchParams(window.location.search).get('price');

        if (!price) {
            statusText.innerText = "결제 정보 오류";
            return;
        }

        try {
            // [추가] 두 컬렉션(boards, jjjj)을 모두 확인하는 배열
            const collections = ["boards", "jjjj"];
            let found = false;

            for (const colName of collections) {
                const q = query(collection(db, colName), where("status", "==", "대기"));
                const querySnapshot = await getDocs(q);

                for (const doc of querySnapshot.docs) {
                    // price 값 비교 (문자열 변환하여 비교)
                    if (String(doc.data().price) === String(price)) {
                        await updateDoc(doc.ref, { status: "카드결제" });
                        found = true;
                        break; // jjjj에서 찾았으면 완료
                    }
                }
                if (found) break; // boards에서 찾았어도 완료
            }

            if (found) {
                statusText.innerText = "결제가 완료되었습니다!";
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
                setTimeout(() => window.close(), 1000);
            } else {
                statusText.innerText = "결제전송완료";
            }
        } catch (err) {
            console.error(err);
            statusText.innerText = "결제전송완료";
        }
    }

    processPaymentStatus();
</script>
</body>
</html>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const paidPrice = urlParams.get('price'); // URL에서 가격(100) 가져옴
    const statusMsg = document.getElementById('status-message');

    async function processPayment() {
        if (!paidPrice) {
            statusMsg.innerText = "오류: 결제 금액 정보가 없습니다.";
            return;
        }

        try {
            // 1. 상태가 '대기'인 모든 주문을 가져옴 (문서 ID를 모르니까 전체에서 조건으로 찾기)
            const q = query(collection(db, "boards"), where("status", "==", "대기"));
            const querySnapshot = await getDocs(q);

            let foundDoc = null;

            // 2. 받아온 가격(paidPrice)과 게시글의 가격을 비교
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // 데이터의 price가 숫자일 수도, 문자열일 수도 있으므로 String()으로 맞춰서 비교
                if (String(data.price) === String(paidPrice)) {
                    foundDoc = doc;
                }
            });

            if (!foundDoc) {
                statusMsg.innerText = `주문을 찾을 수 없습니다. (가격: ${paidPrice}원 일치하는 대기 주문 없음)`;
                return;
            }

            // 3. 찾은 주문을 '카드결제'로 업데이트
            await updateDoc(foundDoc.ref, { status: "카드결제" });

            statusMsg.innerText = "결제가 완료되셨습니다.";
            
            if (window.opener) window.opener.location.reload();
            setTimeout(() => window.close(), 1000);

        } catch (err) {
            statusMsg.innerText = "상태 변경 실패: " + err.message;
        }
    }

    processPayment();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 처리 중</title>
</head>
<body>
    <h2 id="status-message">결제 확인 중...</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL에서 price만 가져옴
        const urlParams = new URLSearchParams(window.location.search);
        const paidPrice = urlParams.get('price'); 
        const statusMsg = document.getElementById('status-message');

        async function updateStatus() {
            if (!paidPrice) {
                statusMsg.innerText = "금액 정보 없음";
                return;
            }

            try {
                // 1. '대기' 상태인 주문들만 가져옴
                const q = query(collection(db, "boards"), where("status", "==", "대기"));
                const querySnapshot = await getDocs(q);

                let targetDoc = null;
                querySnapshot.forEach((doc) => {
                    // 2. 금액만 비교해서 찾음
                    if (String(doc.data().price) === String(paidPrice)) {
                        targetDoc = doc;
                    }
                });

                if (targetDoc) {
                    // 3. 상태만 바꿈
                    await updateDoc(targetDoc.ref, { status: "카드결제" });
                    statusMsg.innerText = "결제 완료되었습니다.";
                    setTimeout(() => window.close(), 1000);
                } else {
                    statusMsg.innerText = "일치하는 주문을 찾지 못했습니다.";
                }
            } catch (e) {
                statusMsg.innerText = "오류: " + e.message;
            }
        }

        updateStatus();
    </script>
</body>
</html>

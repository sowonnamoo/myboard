<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 처리 중...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl text-center">
        <h2 id="status-message" class="text-lg font-bold text-gray-800">결제 정보를 처리하고 있습니다...</h2>
        <p class="text-sm text-gray-500 mt-2">잠시만 기다려주세요.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. 파이어베이스 초기화 (app.js와 동일한 설정값 사용)
        const firebaseConfig = {
            apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
            authDomain: "board-291e3.firebaseapp.com",
            projectId: "board-291e3",
            storageBucket: "board-291e3.firebasestorage.app",
            messagingSenderId: "25881766316",
            appId: "1:25881766316:web:c03e118cf26d3fff11b209"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. URL 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const orderNo = urlParams.get('order_no'); // app.js에서 넘긴 order_no
        const statusMsg = document.getElementById('status-message');

        async function processPayment() {
            if (!orderNo) {
                statusMsg.innerText = "오류: 주문 정보를 찾을 수 없습니다.";
                return;
            }

            try {
                // 3. 파이어베이스 boards 컬렉션의 해당 주문 문서를 바로 업데이트
                const docRef = doc(db, "boards", orderNo);
                await updateDoc(docRef, { status: "카드결제" });

                statusMsg.innerText = "결제가 성공적으로 완료되었습니다!";
                
                // 4. 부모창(게시판) 새로고침 후 1초 뒤 창 닫기
                if (window.opener) {
                    window.opener.location.reload();
                }
                setTimeout(() => {
                    window.close();
                }, 1000);

            } catch (err) {
                statusMsg.innerText = "상태 변경 실패: " + err.message;
                console.error(err);
            }
        }

        processPayment();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세무 관리 시스템</title>
<style>
    body { font-family: sans-serif; padding: 20px; background: #fff; } /* 회색 배경 제거 */
    .box { max-width: 450px; margin: 0 auto; padding: 0; border: none; border-radius: 0; background: white; box-shadow: none; } /* 테두리, 둥근 모서리, 그림자 제거 */
    input, select { width: 100%; padding: 8px; margin: 3px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; } /* 행간 3px로 조정 */
    .hidden { display: none; }
    button { width: 100%; padding: 12px; margin-top: 5px; background: #03c75a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-search { background: #007bff; }
    .item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .btn-group button { width: auto; padding: 5px 10px; margin-left: 5px; font-size: 12px; }
</style>
</head>
<body>

<div class="box">
    <h3>저장된 내 정보 조회</h3>
    <input type="text" id="searchPhone" placeholder="전화번호(접수자) 입력">
    <button class="btn-search" onclick="searchData()">조회하기</button>
    <div id="resultList" style="margin-bottom: 20px;"></div>

    <hr style="margin: 30px 0;">

    <h3>세무 정보 신규 등록 (최초1회등록시 매월1일 자동발행)</h3>
    <input type="hidden" id="docId">
    <input type="text" id="name" placeholder="상품구입시 접수자성함">
    <input type="text" id="phone" placeholder="접수자 핸드폰번호">
    
    <select id="type" onchange="toggleFields()">
        <option value="tax" selected>세금계산서 (세금계산서 입력시 현금영수증란은 비워두세요)</option>
        <option value="cash">현금영수증 (계산서, 영수증 둘 중 1개만 발행되시오니 1개만 작성해주세요)</option>
    </select>

    <div id="taxFields">
        <input type="text" id="bizNum" placeholder="사업자 등록번호">
        <input type="text" id="bizType" placeholder="업태">
        <input type="text" id="bizItem" placeholder="종목">
        <input type="text" id="bizName" placeholder="상호명">
        <input type="email" id="email" placeholder="발행받을 이메일">
        <input type="text" id="manager" placeholder="담당자 성함">
        <input type="text" id="managerPhone" placeholder="담당자 연락처">
    </div>

<div id="cashFields" class="hidden">
    <input type="text" id="cashNumber" placeholder="현금영수증 발생희망(사업자번호or전화번호중 1개 입력)">
    <input type="email" id="cashEmail" placeholder="발행받을 이메일">
</div>

    <button onclick="saveData()">저장 / 수정하기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COLLECTION_NAME = "segum1";

    window.toggleFields = () => {
        const type = document.getElementById('type').value;
        document.getElementById('taxFields').classList.toggle('hidden', type !== 'tax');
        document.getElementById('cashFields').classList.toggle('hidden', type !== 'cash');
    };

   window.saveData = async () => {
    const id = document.getElementById('docId').value;
    const type = document.getElementById('type').value;

    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !phone) {
        alert('이름과 접수자 핸드폰번호는 필수입니다.');
        return;
    }

    let data = { name, phone, type };

    // 타입별 데이터 세팅 및 필수 입력 체크
    if (type === 'tax') {
        data.bizNum = document.getElementById('bizNum').value.trim();
        data.bizType = document.getElementById('bizType').value.trim();
        data.bizItem = document.getElementById('bizItem').value.trim();
        data.bizName = document.getElementById('bizName').value.trim();
        data.email = document.getElementById('email').value.trim();
        data.manager = document.getElementById('manager').value.trim();
        data.managerPhone = document.getElementById('managerPhone').value.trim();
        data.cashNumber = "";

        if (!data.bizNum || !data.bizType || !data.bizItem || !data.bizName || !data.email || !data.manager || !data.managerPhone) {
            alert('세금계산서 발행을 위한 모든 정보를 빠짐없이 입력해주세요.');
            return;
        }
    } else {
        data.cashNumber = document.getElementById('cashNumber').value.trim();
        data.email = document.getElementById('cashEmail').value.trim();
        data.bizNum = data.bizType = data.bizItem = data.bizName = data.manager = data.managerPhone = "";

        if (!data.cashNumber || !data.email) {
            alert('현금영수증 발행을 위한 정보를 모두 입력해주세요.');
            return;
        }
    }

    try {
        if (id) {
            // 수정 모드
            await updateDoc(doc(db, COLLECTION_NAME, id), data);
            alert('수정 완료!');
        } else {
            // 신규 등록 모드: 중복 확인 로직 추가
            const q = query(collection(db, COLLECTION_NAME), where("phone", "==", phone));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                alert('이미 등록된 핸드폰번호입니다. 조회 기능을 통해 수정해주세요.');
                return;
            }

            await addDoc(collection(db, COLLECTION_NAME), data);
            alert('저장 완료!');
        }
        location.reload();
    } catch (e) {
        alert('저장 중 오류가 발생했습니다: ' + e.message);
    }
};

    window.searchData = async () => {
        const phone = document.getElementById('searchPhone').value;
        if (!phone) {
            alert('전화번호를 입력해주세요.');
            return;
        }

        const q = query(collection(db, COLLECTION_NAME), where("phone", "==", phone));
        const snapshot = await getDocs(q);
        const list = document.getElementById('resultList');
        list.innerHTML = '';

        // 검색 결과가 없을 때의 처리
        if (snapshot.empty) {
            list.innerHTML = '<p style="color: red; text-align: center; font-size: 13px;">등록정보가 없습니다. 아래 작성해주세요.</p>';
            return;
        }

        snapshot.forEach(d => {
            const data = d.data();
            // 수정 시 데이터 전달을 위해 작은따옴표로 변환된 문자열 생성
            const dataStr = JSON.stringify(data).replace(/"/g, "'");
            list.innerHTML += `<div class="item">
                ${data.name} (${data.type === 'tax' ? '세금' : '현금'})
                <div class="btn-group">
                    <button onclick="editData('${d.id}', ${dataStr})">조회/수정</button>
                    <button onclick="deleteData('${d.id}')">삭제</button>
                </div>
            </div>`;
        });
    };

    window.editData = (id, data) => {
    document.getElementById('docId').value = id;
    document.getElementById('name').value = data.name;
    document.getElementById('phone').value = data.phone;
    document.getElementById('type').value = data.type;
    toggleFields();

    // 타입에 따라 알맞은 이메일 칸에 데이터 채우기
    if (data.type === 'tax') {
        document.getElementById('email').value = data.email || '';
    } else {
        document.getElementById('cashEmail').value = data.email || '';
    }
    
    document.getElementById('cashNumber').value = data.cashNumber || '';
    document.getElementById('bizNum').value = data.bizNum || '';
    document.getElementById('bizType').value = data.bizType || '';
    document.getElementById('bizItem').value = data.bizItem || '';
    document.getElementById('bizName').value = data.bizName || '';
    document.getElementById('manager').value = data.manager || '';
    document.getElementById('managerPhone').value = data.managerPhone || '';
    window.scrollTo(0,0);
};

    window.deleteData = async (id) => {
        if(confirm('정말 삭제하시겠습니까?')) {
            await deleteDoc(doc(db, COLLECTION_NAME, id));
            searchData();
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 확인</title>
    <style>
        body { 
            margin: 0; 
            background: white; /* 깔끔한 흰색 배경 */
            display: flex; 
            justify-content: center; 
        }
        
        #container { 
            position: relative; 
            width: 744px; /* 가로 고정 */
            background-color: white;
        }

        /* 이미지: 하단 여백 제거를 위해 display: block */
        #main-img { 
            width: 100%; 
            display: block; 
        }

        /* 워터마크: 레이어 방식으로 상단 배치 */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 클릭 방해 금지 */
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px; /* 워터마크 크기 */
            opacity: 0.3;
            z-index: 10;
        }

        #loading-msg { 
            text-align: center; 
            padding-top: 100px; 
            color: #999; 
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading-msg">이미지를 불러오는 중입니다...</div>
        <img id="main-img" src="" alt="시안" onload="document.getElementById('loading-msg').style.display='none';">
        <div class="watermark-overlay"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('url');
        if (imgUrl) {
            document.getElementById('main-img').src = imgUrl;
        } else {
            document.getElementById('loading-msg').innerText = "이미지를 찾을 수 없습니다.";
        }
    </script>
</body>
</html>

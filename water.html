<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 보기</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #f9f9f9; min-height: 100vh; }
        .container { position: relative; width: 800px; }
        img { width: 100%; display: block; }
        .watermark { position: absolute; top: 0; left: 0; width: 100%; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <img id="main-img" src="" alt="이미지">
        <img class="watermark" src="https://sowonnamoo1005.cafe24.com/web/1new/watermark.png">
    </div>

    <script>
        // URL에서 이미지 경로 파라미터 가져오기
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('url');
        if (imgUrl) {
            document.getElementById('main-img').src = imgUrl;
        }
    </script>
</body>
</html>

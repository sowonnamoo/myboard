<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 확인</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; background: #eee; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 안내 메시지 */
        #msg { width: 100%; background: #ffeb3b; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; position: sticky; top: 0; z-index: 200; }
        
        #container { 
            position: relative; width: 744px; background-color: white; 
            margin-top: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        
        #main-img { width: 100%; display: block; user-select: none; }
        
        .watermark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px; opacity: 0.3; z-index: 10;
        }

        #save-btn {
            position: fixed; bottom: 20px; right: 20px;
            padding: 15px 25px; background: #2196F3; color: white;
            border-radius: 30px; border: none; cursor: pointer;
            font-weight: bold; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="msg">저장하려면 아래 '이미지 저장하기' 버튼을 누르세요! (워터마크 자동 포함)</div>

    <div id="container">
        <img id="main-img" src="" alt="시안">
        <div class="watermark-overlay"></div>
    </div>

    <button id="save-btn">이미지 저장하기</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const img = document.getElementById('main-img');
        img.src = params.get('url');

        // 저장 버튼 클릭 시 캔버스로 합쳐서 다운로드
        document.getElementById('save-btn').onclick = () => {
            const container = document.getElementById('container');
            
            html2canvas(container, {
                useCORS: true,
                scale: 2 // 고화질 저장
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '시안이미지.jpg';
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        };
    </script>
</body>
</html>

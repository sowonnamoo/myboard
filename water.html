<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 확인</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #f9f9f9; min-height: 100vh; }
        .wrapper { position: relative; width: 800px; display: grid; }
        .msg { grid-area: 1 / 1; width: 100%; }
        .main-img { grid-area: 1 / 1; width: 100%; display: none; }
        /* 워터마크 레이어 */
        .watermark { grid-area: 1 / 1; width: 100%; opacity: 0.5; pointer-events: none; z-index: 2; display: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img id="loading-msg" class="msg" src="https://sowonnamoo1005.cafe24.com/web/1new/preview_v1.jpg" alt="준비중">
        
        <img id="main-img" class="main-img" src="" alt="시안 이미지"
             onload="this.style.display='block'; document.getElementById('loading-msg').style.display='none'; document.getElementById('watermark-img').style.display='block';">
        
        <img id="watermark-img" class="watermark" src="https://sowonnamoo1005.cafe24.com/web/1new/watermark.png">
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('url');
        if (imgUrl) {
            document.getElementById('main-img').src = imgUrl;
        }
    </script>
</body>
</html>

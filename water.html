<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 뷰어</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 뷰어 컨테이너 */
        #viewer { position: relative; cursor: grab; }
        #viewer:active { cursor: grabbing; }

        /* 워터마크 타일 처리 (대각선 도배) */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px; /* 워터마크 크기 조절 */
            opacity: 0.3;
            z-index: 10;
        }

        #main-img { display: block; max-width: 90vw; }
        #loading-msg { position: absolute; color: white; top: 50%; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="viewer">
        <div id="loading-msg">이미지 불러오는 중...</div>
        <img id="main-img" src="" alt="시안">
        <div class="watermark-overlay"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const img = document.getElementById('main-img');
        img.src = params.get('url');

        img.onload = () => {
            document.getElementById('loading-msg').style.display = 'none';
            // Panzoom 적용
            const elem = document.getElementById('viewer');
            const panzoom = Panzoom(elem, { maxScale: 5 });
            elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 확인</title>
    <style>
        body { margin: 0; background: white; display: flex; justify-content: center; }
        
        #container { 
            position: relative; 
            width: 744px; 
            background-color: white; 
            transition: transform 0.3s ease; 
            transform-origin: top center; 
        }
        
        #main-img { 
            width: 100%; 
            display: block; 
            cursor: pointer; 
            /* [추가] 이미지 드래그 방지 */
            user-select: none; 
            -webkit-user-drag: none; 
        }
        
        .watermark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark2.png?34543');
            background-size: 200px; opacity: 0.3; z-index: 10;
        }

        #zoom-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; background: #333; color: white;
            border-radius: 50%; border: none; font-size: 24px; cursor: pointer;
            z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

    <div id="container">
        <img id="main-img" src="" alt="시안" onclick="window.close()">
        <div class="watermark-overlay"></div>
    </div>

    <button id="zoom-btn">🔍</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('main-img').src = params.get('url');

        let isZoomed200 = false;
        const container = document.getElementById('container');
        const btn = document.getElementById('zoom-btn');

        container.style.transform = 'scale(1.5)';

        btn.onclick = () => {
            isZoomed200 = !isZoomed200;
            container.style.transform = isZoomed200 ? 'scale(2.0)' : 'scale(1.5)';
            btn.innerText = isZoomed200 ? '➖' : '🔍';
        };
    </script>
</body>
</html>

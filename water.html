<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 보기</title>
    <style>
        /* 1. 배경을 아예 꽉 채우고 스크롤 생성 */
        body { 
            margin: 0; 
            padding: 20px 0; /* 위아래 약간의 여유 */
            background: #333; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        /* 2. 이미지 컨테이너: 높이를 내부 이미지에 딱 맞춤 */
        #viewer-wrapper {
            position: relative;
            width: 744px;
            background-color: #f9f9f9;
            cursor: move;
            display: flex; /* 이미지 하단 여백 제거 핵심 */
            align-items: flex-start;
        }

        /* 3. 이미지 스타일 */
        #main-img { 
            width: 100%; 
            display: block; /* block으로 설정해야 하단 여백(inline 공백)이 안 생김 */
        }
        
        /* 4. 워터마크 레이어 */
        #watermark-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px;
            opacity: 0.4;
            z-index: 10;
        }

        #loading { color: #666; text-align: center; padding-top: 200px; position: absolute; width: 100%; }
    </style>
</head>
<body>

<div id="viewer-wrapper">
    <div id="loading">이미지 로딩중...</div>
    <img id="main-img" src="" alt="시안">
    <div id="watermark-layer"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const img = document.getElementById('main-img');
    const wrapper = document.getElementById('viewer-wrapper');
    const loading = document.getElementById('loading');

    img.src = params.get('url');

    img.onload = () => {
        loading.style.display = 'none';
    };

    // 휠 확대 기능 (CSS 변환)
    let scale = 1;
    wrapper.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale += e.deltaY > 0 ? -0.2 : 0.2;
        scale = Math.min(Math.max(1, scale), 3);
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.transformOrigin = "top center";
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 확인</title>
    <style>
        /* 배경 전체 */
        body { margin: 0; padding: 0; background: #333; display: flex; justify-content: center; }
        
        /* 이미지 컨테이너 */
        #container { 
            position: relative; 
            width: 800px; /* 고정 너비 */
            background-color: #f9f9f9;
        }

        /* 이미지 기본 설정 */
        #main-img { width: 100%; display: none; }
        #loading-msg { width: 100%; display: block; padding-top: 100px; text-align: center; color: white; }

        /* 워터마크 (대각선 도배) */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px; /* 워터마크 간격 */
            opacity: 0.3;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading-msg">이미지 불러오는 중...</div>
        
        <img id="main-img" src="" alt="시안"
             onload="this.style.display='block'; document.getElementById('loading-msg').style.display='none'; document.getElementById('wm').style.display='block';">
        
        <div id="wm" class="watermark-overlay" style="display:none;"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('url');
        if (imgUrl) {
            document.getElementById('main-img').src = imgUrl;
        }
    </script>
</body>
</html>

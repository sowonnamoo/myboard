<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 이미지 뷰어</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: white; 
            display: flex; 
            justify-content: center; 
            /* 화면이 작아져도 스크롤이 생기도록 min-height 설정 */
            min-height: 100vh; 
            overflow: auto;
        }
        
        /* 뷰어 컨테이너: 이미지의 부모, 항상 중앙 정렬 */
        #viewer { 
            position: relative; 
            cursor: grab; 
            background: white;
            /* 가로 744px 고정, 높이는 내용물에 맞춤 */
            width: 744px; 
            margin: 20px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #viewer:active { cursor: grabbing; }

        /* 워터마크 */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('https://sowonnamoo1005.cafe24.com/web/1new/watermark.png');
            background-size: 200px;
            opacity: 0.3;
            z-index: 10;
        }

        /* 이미지 */
        #main-img { 
            display: block; 
            width: 100%; 
            height: auto;
        }
        
        #loading-msg { 
            position: absolute; 
            color: #999; 
            top: 40%; 
            width: 100%; 
            text-align: center; 
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="viewer">
        <div id="loading-msg">이미지 불러오는 중...</div>
        <img id="main-img" src="" alt="시안">
        <div class="watermark-overlay"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const img = document.getElementById('main-img');
        const imgUrl = params.get('url');
        
        if (imgUrl) img.src = imgUrl;

        img.onload = () => {
            document.getElementById('loading-msg').style.display = 'none';
            
            const elem = document.getElementById('viewer');
            const panzoom = Panzoom(elem, { 
                maxScale: 3,
                minScale: 1,
                contain: 'outside' 
            });
            
            // [수정] 마우스가 이미지 밖으로 나가도 휠 작동하도록 window에 리스너 추가
            window.addEventListener('wheel', panzoom.zoomWithWheel, { passive: false });
        };
    </script>
</body>
</html>

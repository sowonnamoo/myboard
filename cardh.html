<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드결제내역서</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .receipt { width: 400px; border: 2px solid #000080; padding: 20px; }
        h1 { text-align: center; color: #000080; border-bottom: 2px solid #000080; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000080; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f0f4ff; }
        
        .biz-table { margin-bottom: 20px; }
        .row-height { height: 30px; }
        
        .total-section { text-align: right; font-weight: bold; font-size: 18px; margin-top: 20px; }
        .footer { text-align: center; margin-top: 30px; font-size: 14px; }

        @media print {
            body { padding: 0; }
            .receipt { border: none; }
        }
    </style>
</head>
<body onload="initReceipt()"> 

<div class="receipt">
    <h1>카드결제내역서</h1>
    
    <table class="biz-table">
        <tr><th width="30%">사업자번호</th><td colspan="3">411-13-76734</td></tr>
        <tr><th>상호</th><td>에코그래픽스</td><th>대표</th><td>최대한</td></tr>
        <tr><th>업태</th><td>기술서비스</td><th>종목</th><td>인쇄대행</td></tr>
    </table>

    <table>
        <tr><th>월일</th><th>품명</th><th>규격</th><th>수량</th><th>금액</th></tr>
        <tr class="row-height">
            <td id="pDate"></td>
            <td id="pName"></td>
            <td id="pSize"></td>
            <td id="pQty"></td>
            <td id="pPrice"></td>
 </tr>
    <tr class="row-height"><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td></tr>
    <tr class="row-height"><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td></tr>
    <tr class="row-height"><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td></tr>
    <tr class="row-height"><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td></tr>
    <tr class="row-height"><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td><td class="empty-row"></td></tr>
</table>

    <div class="total-section">합계 ₩ <span id="totalPrice"></span>원</div>
    <div class="footer">발행/ 작성일: <span id="footerDate"></span></div>
</div>

<script>
    function initReceipt() {
        // URL 파라미터 가져오기
        const params = new URLSearchParams(window.location.search);
        
        // 데이터 매핑
        document.getElementById('pDate').innerText = params.get('date') || '';
        document.getElementById('pName').innerText = params.get('name') || '';
        document.getElementById('pSize').innerText = params.get('size') || '';
        document.getElementById('pQty').innerText = params.get('qty') || '';
        document.getElementById('pPrice').innerText = params.get('price') || '';
        document.getElementById('totalPrice').innerText = params.get('price') || '0';
        document.getElementById('footerDate').innerText = params.get('date') || '';

        // 0.5초 대기 후 인쇄 (데이터 로딩 시간 확보)
        setTimeout(() => {
            window.print();
        }, 500);
    }
</script>

</body>
</html>

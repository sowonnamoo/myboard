<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>장바구니</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="w-[350px] mx-auto bg-white p-4 border rounded shadow-lg">
        <h2 class="font-bold text-lg mb-4">🛒 장바구니</h2>
        <div id="cart-list" class="space-y-3 text-sm"></div>
        <div class="mt-6 pt-4 border-t font-bold text-right">
            합계: <span id="total-price">0</span>원
        </div>
        <div class="mt-4 flex gap-2">
            <button class="flex-1 bg-green-700 text-white py-2 rounded text-sm">무통장입금</button>
            <button class="flex-1 bg-blue-900 text-white py-2 rounded text-sm">카드결제</button>
        </div>
        <button onclick="window.close()" class="w-full mt-2 text-gray-400 text-xs py-2">창 닫기</button>
    </div>

    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('myCart') || '[]');
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = "";
            cart.forEach((item, index) => {
                total += parseInt(item.price);
                list.innerHTML += `
                    <div class="flex justify-between border-b pb-2">
                        <div>${item.name}<br><span class="text-xs text-gray-500">${item.size} / ${item.qty}개</span></div>
                        <div class="text-right">
                            ${item.price.toLocaleString()}원
                            <button onclick="removeItem(${index})" class="block text-red-400 text-xs">삭제</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
        }
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('myCart'));
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            loadCart();
        }
        loadCart();
    </script>
</body>
</html>

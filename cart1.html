<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>장바구니</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <div class="w-[460px] mx-auto bg-white p-6">
        <h2 class="font-bold text-lg mb-4">🛒 장바구니</h2>
        
        <div id="cart-list" class="space-y-3 text-sm"></div>
        
        <div class="mt-6 pt-4 border-t font-bold text-right pr-5">
            합계: <span id="total-price">0</span>원
        </div>
        
        <div class="mt-4 flex gap-2">
            <button onclick="pay('bank')" class="flex-1 bg-green-700 text-white py-2 rounded text-sm">무통장입금</button>
            <button onclick="pay('card')" class="flex-1 bg-blue-900 text-white py-2 rounded text-sm">카드결제</button>
        </div>

        <button onclick="printEstimate()" class="w-full mt-2 bg-gray-200 text-gray-700 py-1.5 rounded text-xs hover:bg-gray-300">
            📄 견적서 출력
        </button>
        
        <button onclick="window.close()" class="w-full mt-2 text-gray-400 text-xs py-2">창 닫기</button>
    </div>

    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('myCart') || '[]');
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = "";
            
            cart.forEach((item, index) => {
                total += parseInt(item.price);
                list.innerHTML += `
                    <div class="flex justify-between border-b pb-2">
                        <div>
                            ${item.name}<br>
                            <span class="text-xs text-gray-500">${item.size} / ${item.qty}개</span>
                        </div>
                        <div class="text-right pr-5">
                            ${parseInt(item.price).toLocaleString()}원
                            <button onclick="removeItem(${index})" class="block text-red-400 text-xs w-full">삭제</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('myCart'));
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            loadCart();
        }

        // 결제 로직 통합 함수
        function pay(type) {
            const totalText = document.getElementById('total-price').innerText;
            const totalAmount = totalText.replace(/[^0-9]/g, '');

            if (!totalAmount || parseInt(totalAmount) === 0) {
                alert("결제할 금액이 없습니다.");
                return;
            }

            if (type === 'bank') {
                const url = `https://sowonnamoo.github.io/myboard/mooto?price=${totalAmount}`;
                window.open(url, 'bankPaymentWindow', 'width=494,height=639,scrollbars=yes,resizable=yes');
            } else {
                const url = `https://sowonnamoo.github.io/myjs/payment?price=${totalAmount}`;
                window.open(url, 'paymentWindow', 'width=811,height=649,scrollbars=yes,resizable=yes');
            }
        }

        // 견적서 출력 함수 (별도 파일 없이 팝업 생성)
        function printEstimate() {
    const cart = JSON.parse(localStorage.getItem('myCart') || '[]');
    if (cart.length === 0) return alert("출력할 상품이 없습니다.");
    
    const cartHtml = document.getElementById('cart-list').innerHTML;
    const total = document.getElementById('total-price').innerText;
    const today = new Date().toLocaleDateString('ko-KR');

    const win = window.open('', 'estimateWindow', 'width=700,height=850,scrollbars=yes');
    win.document.write(`
        <html>
            <head>
                <title>견적서</title>
                <style>
                    body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; color: #333; }
                    .header { display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 30px; }
                    .title { font-size: 28px; font-weight: bold; }
                    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
                    .info-table th, .info-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
                    .info-table th { background: #f4f4f4; width: 100px; }
                    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
                    th { border-bottom: 2px solid #333; border-top: 2px solid #333; padding: 12px; background: #fafafa; }
                    td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
                    .total { text-align: right; font-size: 20px; font-weight: bold; color: #d32f2f; }
                    @media print { .no-print { display: none; } }
                </style>
            </head>
            <body>
                <div class="header">
                    <div class="title">견 적 서</div>
                    <div style="text-align: right;">
                        <div>발행일: ${today}</div>
                        <div style="font-weight:bold; font-size:18px;">에코그래픽스(411-13-76734) tel : 1599-2461</div>
                    </div>
                </div>
                
                <table class="info-table">
                    <tr><th>수신</th><td>고객님</td><th>공급자</th><td>에코그래픽스</td></tr>
                </table>

                <table>
                    <thead>
                        <tr><th>품목명</th><th>사이즈</th><th>수량</th></tr>
                    </thead>
                    <tbody>
                        ${cart.map(item => `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.size}</td>
                                <td>${item.qty}개</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div class="total">합계 금액: ${total} 원</div>
                
                <button class="no-print" onclick="window.print()" style="margin-top: 40px; width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 16px;">
                    이 견적서 인쇄하기
                </button>
            </body>
        </html>
    `);
}
        
        loadCart();
    </script>
</body>
</html>

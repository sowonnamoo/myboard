<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빠른 재구입</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; color: white; font-weight: bold; border-radius: 4px; }
        .active { background: #e63946; }
        .inactive { background: #adb5bd; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group button { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: white; }
    </style>
</head>
<body>

<div class="box">
    <div class="tabs">
        <button class="tab-btn active" id="btn-no-change">변동 없음</button>
        <button class="tab-btn inactive" id="btn-change">변동 있음</button>
    </div>
    
    <div class="input-group">
        <label>제품명</label>
        <input type="text" id="productName" placeholder="제품명">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>수량</label>
            <input type="text" id="quantity" placeholder="수량">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>사이즈</label>
            <input type="text" id="size" placeholder="사이즈">
        </div>
    </div>
    
    <div class="input-group">
        <label>결제금액</label>
        <input type="text" id="price" placeholder="숫자만">
    </div>
    
    <div class="input-group">
        <label>이미지 번호</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="imgCode" readonly placeholder="이미지 코드">
            <button type="button" onclick="openImage()" style="width:100px; background:#555; color:white; border:none; cursor:pointer; border-radius:4px;">이미지 보기</button>
        </div>
    </div>

    <div class="input-group">
        <label>작성자명</label>
        <input type="text" id="name" placeholder="접수자이름">
    </div>
    
    <div class="input-group">
        <label>핸드폰 번호</label>
        <input type="text" id="phone" placeholder="-없이 입력해주세요">
    </div>

    <div class="input-group">
        <label>주소</label>
        <input type="text" id="address" placeholder="기본 주소">
    </div>

    <div class="input-group">
        <label>상세주소</label>
        <input type="text" id="addressDetail" placeholder="상세 주소">
    </div>

    <div class="btn-group">
        <button onclick="submitOrder('무통장')" style="background-color: #15803d;">무통장결제</button>
        <button onclick="submitOrder('카드')" style="background-color: #1e3a8a;">카드결제</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const fullTitle = params.get('productName');
        const imgCode = params.get('imgCode');

        if (fullTitle) {
            // [수정] 이름, 주소, 연락처 자동 채우기 로직은 삭제했습니다.
            
            // 제품 정보(제품명/수량/사이즈)와 결제금액만 자동으로 채워지도록 유지
            const contentMatch = fullTitle.match(/\((.*?)\)/);
            if (contentMatch) {
                const parts = contentMatch[1].split('/');
                document.getElementById('productName').value = parts[0]?.trim() || '';
                document.getElementById('quantity').value = parts[1]?.trim() || '';
                document.getElementById('size').value = parts[2]?.trim() || '';
            }
            const priceMatch = fullTitle.match(/\)\s+(\d+)/);
            if (priceMatch && priceMatch[1]) document.getElementById('price').value = priceMatch[1].trim();
        }
        
        // 이미지 코드는 확인용이므로 유지
        if (imgCode) document.getElementById('imgCode').value = imgCode;
    };

    window.openImage = () => {
        const imgCode = document.getElementById('imgCode').value;
        if (!imgCode) { alert("이미지 번호가 없습니다."); return; }
        window.open(`photo1.html?designNo=${imgCode}`, '_blank', 'width=744,height=600,scrollbars=yes');
    };

 window.submitOrder = async (type) => {
    // 입력값 가져오기
    const price = document.getElementById('price').value;
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const addressDetail = document.getElementById('addressDetail').value;
    
    if (!name || !price) {
        alert("작성자명과 결제금액은 필수입니다.");
        return;
    }

    // DB에 저장할 데이터 객체
    const orderData = {
        productName: document.getElementById('productName').value,
        quantity: document.getElementById('quantity').value,
        size: document.getElementById('size').value,
        price: price,
        imgCode: document.getElementById('imgCode').value,
        type: type,
        author: name,
        phone: phone,
        address: address + " " + addressDetail,
        createdAt: new Date(),
        status: '대기',
        // [중요] 필터링을 위해 '재주문'을 유지하되, 
        // app.js에서 아래 값을 정확히 비교하도록 설계할 것입니다.
        jajoo: '재주문'
    };

    try {
        await addDoc(collection(db, "boards"), orderData);
        
        if (type === '무통장') {
            window.location.href = `https://sowonnamoo.github.io/myboard/mooto?price=${encodeURIComponent(price)}`;
        } else {
            // 카드 결제 창 열기
            window.open(
                `https://sowonnamoo.github.io/myjs/payment?price=${encodeURIComponent(price)}`, 
                '_blank', 
                'width=1000,height=700,scrollbars=yes'
            );

            // 결제 완료 신호 감지
            window.addEventListener("message", function listener(event) {
                if (event.data === "paymentSuccess") {
                    alert("카드 결제가 완료되었습니다.");
                    window.location.reload();
                    window.removeEventListener("message", listener);
                }
            });
        }
    } catch (e) {
        alert('주문 처리 중 오류 발생: ' + e.message);
        }
    };
</script>
</body>
</html>

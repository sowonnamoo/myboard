<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빠른 재구입</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; color: white; font-weight: bold; border-radius: 4px; }
        .active { background: #e63946; }
        .inactive { background: #adb5bd; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; padding: 15px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div class="tabs">
        <button class="tab-btn active" id="btn-no-change">수량,사이즈,금액변동 없음</button>
        <button class="tab-btn inactive" id="btn-change">수량,사이즈,금액변동 있음</button>
    </div>
    
    <input type="text" id="productName" placeholder="구입 제품명">
    <input type="text" id="qty" placeholder="수량">
    <input type="text" id="size" placeholder="사이즈">
    <input type="text" id="price" placeholder="결제금액 (숫자만)">
    
    <div style="display:flex; gap:10px; margin-bottom: 10px;">
        <input type="text" id="imgCode" readonly style="flex:1;" placeholder="이미지 번호">
        <button type="button" onclick="openImage()" style="flex:1; background:#555; color:white; border:none; cursor:pointer;">이미지 보기</button>
    </div>

    <input type="text" id="name" placeholder="작성자명">
    <input type="text" id="phone" placeholder="접수자 핸드폰">
    <input type="text" id="address" placeholder="주소">
    <input type="text" id="addressDetail" placeholder="상세주소">

    <div class="btn-group">
        <button onclick="submitOrder('카결')">카결</button>
        <button onclick="submitOrder('무결')">무결</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const fullTitle = params.get('productName');
        const imgCode = params.get('imgCode');

        if (fullTitle) {
            const cleanData = fullTitle.replace(/[()]/g, '');
            const parts = cleanData.split('님');
            const dataStr = parts.length > 1 ? parts[1].trim() : parts[0].trim();
            const items = dataStr.split('/');
            
            if (items[0]) document.getElementById('productName').value = items[0].trim();
            if (items[1]) document.getElementById('qty').value = items[1].trim();
            if (items[2]) document.getElementById('size').value = items[2].trim();
            if (items[3]) document.getElementById('price').value = items[3].trim();
            if (parts[0]) document.getElementById('name').value = parts[0].trim();
        }

        if (imgCode) {
            document.getElementById('imgCode').value = imgCode;
        }
    };

    window.openImage = () => {
    const imgCode = document.getElementById('imgCode').value;
    if (!imgCode) {
        alert("이미지 번호가 없습니다.");
        return;
    }
    
    // resizable=no 옵션 추가
    const win = window.open('', '_blank', 'width=700,height=800,resizable=no');
    
    win.document.write(`
        <body style="margin:0; text-align:center;" oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">
            <img src="https://sowonnamoo1005.cafe24.com/1/${imgCode}.jpg" style="width:100%;">
        </body>
    `);
    win.document.title = "이미지 보기";
};
};

    document.getElementById('btn-no-change').onclick = function() {
        this.className = 'tab-btn active';
        document.getElementById('btn-change').className = 'tab-btn inactive';
    };
    document.getElementById('btn-change').onclick = function() {
        this.className = 'tab-btn active';
        document.getElementById('btn-no-change').className = 'tab-btn inactive';
    };

    window.submitOrder = async (type) => {
        const orderData = {
            productName: document.getElementById('productName').value,
            quantity: document.getElementById('qty').value,
            size: document.getElementById('size').value,
            price: document.getElementById('price').value,
            imgCode: document.getElementById('imgCode').value,
            type: type,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value.replace(/[^0-9]/g, ''),
            address: document.getElementById('address').value + " " + document.getElementById('addressDetail').value,
            timestamp: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "reorders"), orderData);
            alert('주문 접수 완료!');
        } catch (e) {
            alert('오류 발생: ' + e.message);
        }
    };
</script>
</body>
</html>

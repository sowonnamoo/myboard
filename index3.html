<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빠른 재구입</title>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        input[readonly] { background: #f0f0f0; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group button { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: white; }
    </style>
</head>
<body>

<div class="box">
    <div class="input-group"><label>제품명</label><input type="text" id="productName" readonly></div>
    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;"><label>수량</label><input type="text" id="quantity" readonly></div>
        <div class="input-group" style="flex: 1;"><label>사이즈</label><input type="text" id="size" readonly></div>
    </div>
    <div class="input-group"><label>결제금액</label><input type="text" id="price" readonly></div>
    <div class="input-group"><label>이미지 번호</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="imgCode" readonly>
            <button type="button" onclick="openImage()" style="width:100px; background:#555; color:white; border:none; cursor:pointer; border-radius:4px;">이미지 보기</button>
        </div>
    </div>
    <div class="input-group"><label>작성자명</label><input type="text" id="name" placeholder="필수 입력"></div>
    <div class="input-group"><label>핸드폰 번호</label><input type="text" id="phone" placeholder="필수 입력"></div>
    <div class="input-group">
        <label>주소</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="address" placeholder="주소 검색 버튼 클릭" readonly>
            <button type="button" onclick="execDaumPostcode()" style="width:100px; background:#444; color:white; border:none; cursor:pointer; border-radius:4px;">주소검색</button>
        </div>
    </div>
    <div class="input-group"><label>상세주소</label><input type="text" id="addressDetail" placeholder="상세주소 입력"></div>
    
    <input type="hidden" id="message">
    <input type="hidden" id="file1Url">
    <input type="hidden" id="file2Url">

    <div class="btn-group">
        <button onclick="submitOrder('무통장')" style="background-color: #15803d;">무통장결제</button>
        <button onclick="submitOrder('카드')" style="background-color: #1e3a8a;">카드결제</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
        authDomain: "board-291e3.firebaseapp.com",
        projectId: "board-291e3",
        storageBucket: "board-291e3.firebasestorage.app",
        messagingSenderId: "25881766316",
        appId: "1:25881766316:web:c03e118cf26d3fff11b209"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.execDaumPostcode = () => {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById("address").value = data.address;
                document.getElementById("addressDetail").focus();
            }
        }).open();
    };

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const fullTitle = params.get('productName');
        if (fullTitle) {
            const contentMatch = fullTitle.match(/\((.*?)\)/);
            if (contentMatch) {
                const parts = contentMatch[1].split('/');
                document.getElementById('productName').value = parts[0]?.trim() || '';
                document.getElementById('quantity').value = parts[1]?.trim() || '';
                document.getElementById('size').value = parts[2]?.trim() || '';
            }
            const priceMatch = fullTitle.match(/\)\s+(\d+)/);
            if (priceMatch) document.getElementById('price').value = priceMatch[1].trim();
        }
        if (params.get('imgCode')) document.getElementById('imgCode').value = params.get('imgCode');
        if (params.get('message')) document.getElementById('message').value = params.get('message');
        if (params.get('file1Url')) document.getElementById('file1Url').value = params.get('file1Url');
        if (params.get('file2Url')) document.getElementById('file2Url').value = params.get('file2Url');
    };

    window.openImage = () => {
        const imgCode = document.getElementById('imgCode').value;
        if (!imgCode) { alert("이미지 번호가 없습니다."); return; }
        window.open(`photo1.html?designNo=${imgCode}`, '_blank', 'width=744,height=600,scrollbars=yes');
    };

  window.submitOrder = async (type) => {
        const name = document.getElementById('name').value.trim();
        const phoneInput = document.getElementById('phone').value.trim(); // 변수명 유지
        const address = document.getElementById('address').value.trim();
        const addressDetail = document.getElementById('addressDetail').value.trim();
        
        const phoneRegex = /^01([0|1|6|7|8|9])([0-9]{3,4})([0-9]{4})$/;
        
        if (!name || !address || !addressDetail) {
            alert("작성자명, 주소, 상세주소는 필수 입력 항목입니다.");
            return;
        }
        
        if (!phoneRegex.test(phoneInput)) {
            alert("핸드폰 번호를 정확히 11자리 숫자로 입력해주세요.");
            return;
        }

        const orderData = {
            // ... (기타 데이터 동일)
            author: name,
            phone: phoneInput, // [중요] 위에서 정의한 phoneInput 변수 사용
            address: address + " " + addressDetail,
            message: document.getElementById('message').value,
            file1Url: document.getElementById('file1Url').value,
            file2Url: document.getElementById('file2Url').value,
            type: type,
            createdAt: new Date(),
            status: '대기'
        };

        try {
            await addDoc(collection(db, "jjjj"), orderData);
            if (type === '무통장') {
                window.location.href = `https://sowonnamoo.github.io/myboard/mooto?price=${encodeURIComponent(orderData.price)}`;
            } else {
                alert("주문서 저장 완료. 결제 창으로 이동합니다.");
                const payWindow = window.open(`https://sowonnamoo.github.io/myjs/payment?price=${encodeURIComponent(orderData.price)}`, '_blank', 'width=1000,height=700');
                window.addEventListener("message", function listener(e) {
                    if (e.data === "paymentSuccess") {
                        alert("결제 완료되었습니다.");
                        if (payWindow) payWindow.close();
                        window.location.reload();
                        window.removeEventListener("message", listener);
                    }
                });
            }
        } catch (e) { alert('오류: ' + e.message); }
    };
</script>
</body>
</html>

<div class="box">
    <div class="input-group">
        <label>제품명</label>
        <input type="text" id="productName" placeholder="제품명">
    </div>
    
    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>수량</label>
            <input type="text" id="quantity" placeholder="수량">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>사이즈</label>
            <input type="text" id="size" placeholder="사이즈">
        </div>
    </div>

    <div class="input-group">
        <label>결제금액</label>
        <input type="text" id="price" placeholder="숫자만">
    </div>
    
    </div>

<script type="module">
    // ... 파이어베이스 설정 생략 ...

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const fullTitle = params.get('productName'); // 예: "홍길동님 (스티커/100/A4) 50000"
        const imgCode = params.get('imgCode');

        if (fullTitle) {
            // 이름 추출
            const nameMatch = fullTitle.match(/^(.*?)님/);
            if (nameMatch) document.getElementById('name').value = nameMatch[1].trim();

            // 괄호 안의 내용 (제품/수량/사이즈) 추출
            const contentMatch = fullTitle.match(/\((.*?)\)/);
            if (contentMatch) {
                const parts = contentMatch[1].split('/');
                if (parts[0]) document.getElementById('productName').value = parts[0].trim();
                if (parts[1]) document.getElementById('quantity').value = parts[1].trim();
                if (parts[2]) document.getElementById('size').value = parts[2].trim();
            }

            // 금액 추출
            const priceMatch = fullTitle.match(/\)\s+(\d+)/);
            if (priceMatch && priceMatch[1]) document.getElementById('price').value = priceMatch[1].trim();
        }
        if (imgCode) document.getElementById('imgCode').value = imgCode;
    };

    window.submitOrder = async (type) => {
        const price = document.getElementById('price').value;
        const name = document.getElementById('name').value;
        
        // 데이터 객체 생성 시 분리된 필드들을 합침
        const orderData = {
            productName: document.getElementById('productName').value,
            quantity: document.getElementById('quantity').value,
            size: document.getElementById('size').value,
            price: price,
            imgCode: document.getElementById('imgCode').value,
            type: type,
            author: name,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value + " " + document.getElementById('addressDetail').value,
            createdAt: new Date(),
            jajoo: '재주문' // 게시판 필터링을 위한 필드
        };

        try {
            await addDoc(collection(db, "boards"), orderData);
            
            if (type === '무통장') {
                window.location.href = `https://sowonnamoo.github.io/myboard/mooto?price=${encodeURIComponent(price)}`;
            } else {
                alert("카드 결제가 접수되었습니다.");
            }
        } catch (e) {
            alert('주문 처리 중 오류 발생: ' + e.message);
        }
    };
</script>

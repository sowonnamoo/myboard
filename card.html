<div style="max-width: 800px; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; padding: 20px;">
    <!-- 상단 텍스트 (고급스러운 고딕 스타일) -->
    <div style="text-align: center; color: #8B0000; font-weight: 700; margin-bottom: 20px; font-size: 22px; letter-spacing: -0.5px;">
        [주문서 접수완료] 이제 “결제” 를 진행해주세요.
    </div>

    <!-- 버튼 영역 -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <style>
            .pay-btn {
                flex: 1;
                border: none;
                padding: 17px 0; 
                font-weight: 600; /* 조금 더 세련된 굵기 */
                font-size: 16px;
                cursor: pointer;
                color: white;
                border-radius: 10px;
                transition: opacity 0.3s ease, transform 0.2s ease;
            }
            .pay-btn:hover {
                opacity: 0.85;
                transform: translateY(-2px); /* 마우스 올릴 때 살짝 떠오르는 효과 */
            }
        </style>

        <button class="pay-btn" style="background-color: #7a7474;">시안보기</button>
        <button class="pay-btn" style="background-color: #579302;">무통장결제</button>
        <button class="pay-btn" style="background-color: #105196;">카드결제</button>
    </div>

    <!-- 하단 설명 문구 -->
    <div style="text-align: center; color: #666; font-size: 14px; line-height: 1.5;">
        결제가 완료되시면 시안보기 게시판에 시안이 등록됩니다. 
        교정 후 인쇄승인 버튼을 누르시면 인쇄가 진행됩니다.
    </div>
</div>

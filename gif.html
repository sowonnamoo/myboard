<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        canvas { background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin-top: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="w-[700px] mt-6 flex justify-end">
        <button onclick="saveImage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md transition">
            700px로 저장하기
        </button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="mt-4 text-gray-400 text-[10px]">
        이미지 번호: <span id="code-text"></span> | © 2026 YOUR COMPANY
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        async function init() {
            if (!code) return;
            document.getElementById('code-text').innerText = code;

            const imageUrl = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg`;

            try {
                // 1. 이미지를 blob(데이터 덩어리)으로 직접 가져와서 CORS 문제 회피
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const bitmap = await createImageBitmap(blob);

                // 2. 700px 고정 너비로 캔버스 크기 조절
                const ratio = 700 / bitmap.width;
                canvas.width = 700;
                canvas.height = bitmap.height * ratio;

                // 3. 캔버스에 그리기
                ctx.drawImage(bitmap, 0, 0, 700, canvas.height);
            } catch (err) {
                console.error("이미지 로드 실패:", err);
                alert("이미지를 불러올 수 없습니다. 경로를 확인해주세요.");
            }
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `${code}_700px.jpg`;
            // 캔버스 내용을 이미지 데이터로 변환
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        }

        // 초기 실행
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 포토샵 같은 어두운 배경 스타일 */
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div id="viewer" class="bg-white shadow-2xl p-1" style="width: 700px;">
        <img id="main-image" src="" class="w-full h-auto block" alt="시안이미지">
    </div>

    <div class="fixed bottom-0 w-full bg-gray-800 text-gray-400 text-[10px] py-1 text-center">
        이미지 번호: <span id="code-text"></span> | © 2026 YOUR COMPANY
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            document.getElementById('code-text').innerText = code;
            document.getElementById('main-image').src = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 다운로드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl text-center w-80">
        <h2 class="text-lg font-bold text-gray-800 mb-4" id="status-text">시안 이미지를 불러오는 중...</h2>
        <div id="loader" class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        
        <button id="download-btn" class="hidden bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
            지금 다운로드하기
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const imgUrl = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg`;
        
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader');
        const downloadBtn = document.getElementById('download-btn');

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = imgUrl;

        img.onload = () => {
            const maxWidth = 700;
            const scale = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 로딩 완료 UI 변경
            statusText.innerText = "준비가 완료되었습니다!";
            loader.classList.add('hidden');
            downloadBtn.classList.remove('hidden');

            // 버튼 클릭 시 다운로드
            downloadBtn.onclick = () => {
                const link = document.createElement("a");
                link.download = `${code}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                window.close();
            };

            // 1초 후 자동 다운로드 실행
            setTimeout(() => downloadBtn.click(), 1000);
        };

        img.onerror = () => {
            statusText.innerText = "이미지를 찾을 수 없습니다.";
            loader.classList.add('hidden');
        };
    </script>
</body>
</html>

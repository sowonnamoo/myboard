<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 저장(워터마크 포함)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        canvas { background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin-top: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="w-[700px] mt-6 flex justify-end">
        <button onclick="saveImage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md transition">
            워터마크 포함 저장
        </button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        if (code) {
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.src = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg?t=${Date.now()}`;

            img.onload = function() {
                const ratio = 700 / img.width;
                canvas.width = 700;
                canvas.height = img.height * ratio;
                
                // 1. 원본 이미지 그리기
                ctx.drawImage(img, 0, 0, 700, canvas.height);
                
                // 2. 워터마크 글씨 넣기 (미니 포토샵 기능!)
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; // 흰색 반투명
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                
                // 이미지 하단 중앙에 워터마크 삽입
                ctx.fillText("YOUR COMPANY", 350, canvas.height - 30);
            };
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `${code}_watermark.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        }
    </script>
</body>
</html>

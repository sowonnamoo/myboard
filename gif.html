<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        canvas { background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin-top: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="w-[700px] mt-6 flex justify-end">
        <button onclick="saveImage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md transition">
            700px로 저장하기
        </button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="mt-4 text-gray-400 text-[10px]">
        이미지 번호: <span id="code-text"></span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        if (code) {
            document.getElementById('code-text').innerText = code;

            const img = new Image();
            // CORS 문제를 완화하기 위해 crossOrigin 설정
            img.crossOrigin = "anonymous"; 
            
            // 캐시를 방지하기 위해 타임스탬프 추가
            img.src = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg?t=${Date.now()}`;

            img.onload = function() {
                const ratio = 700 / img.width;
                canvas.width = 700;
                canvas.height = img.height * ratio;
                ctx.drawImage(img, 0, 0, 700, canvas.height);
            };

            img.onerror = function() {
                alert("이미지를 불러올 수 없습니다. 경로 또는 서버 권한을 확인해주세요.");
                console.error("이미지 로드 경로:", img.src);
            };
        }

        function saveImage() {
            if (canvas.width === 0) return alert("이미지가 준비되지 않았습니다.");
            const link = document.createElement('a');
            link.download = `${code}_700px.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 캡처 도구</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        body { background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #image-container { max-width: 800px; }
        img { max-width: 100%; display: block; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="image-container">
        <img id="image" src="https://sowonnamoo1005.cafe24.com/1/파일명.jpg">
    </div>

    <div class="controls">
        <button id="crop-btn">선택 영역 저장하기</button>
    </div>

    <script>
        const image = document.getElementById('image');
        const cropper = new Cropper(image, {
            viewMode: 1,
            dragMode: 'crop',
            autoCropArea: 0.5,
        });

        document.getElementById('crop-btn').addEventListener('click', () => {
            // 선택한 영역만 캔버스로 만들기
            const canvas = cropper.getCroppedCanvas();
            const link = document.createElement('a');
            link.download = 'capture.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    </script>
</body>
</html>

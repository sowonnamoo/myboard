<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 저장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #capture-area { background-color: white; width: 700px; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="w-[700px] mt-6 flex justify-end">
        <button onclick="captureAndSave()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md transition">
            페이지 전체 저장하기
        </button>
    </div>

    <div id="capture-area">
        <img id="main-image" src="" style="width: 100%; display: block;">
        <div class="mt-4 text-center text-gray-500 text-sm">
            이미지 번호: <span id="code-text"></span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        // 이미지 로드
        if (code) {
            document.getElementById('code-text').innerText = code;
            document.getElementById('main-image').src = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg`;
        }

        // html2canvas를 사용하여 캡처 후 저장
        function captureAndSave() {
            const area = document.getElementById('capture-area');
            
            html2canvas(area, {
                width: 700, // 캡처 너비 강제 고정
                windowWidth: 700,
                scale: 2 // 고화질 캡처를 위해 2배 확대
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${code}_capture.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>

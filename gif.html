<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 다운로드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 우클릭 방지 적용 */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    </style>
</head>
<body class="w-[300px] h-[400px] flex flex-col justify-between items-center p-6 bg-gray-50" oncontextmenu="return false">
    
    <div class="flex-grow flex flex-col items-center justify-center">
<h2 class="text-xl font-bold text-gray-800 mb-2">시안 다운로드</h2>
<p id="code-display" class="text-sm text-blue-600 font-bold mb-6"></p>

<script>
    // URL에서 code 파라미터 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    // 가져온 번호를 화면에 표시
    if(code) {
        document.getElementById('code-display').innerText = "이미지 번호: " + code;
    }

    // 버튼 클릭 시 즉시 다운로드 실행
    function startDownload() {
        if (!code) return;
        
        const imageUrl = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg`;
        const link = document.createElement('a');
        link.href = imageUrl;
        link.download = `${code}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

<button onclick="startDownload()" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
    파일 다운로드
</button>
    </div>

    <div class="text-[10px] text-gray-400 text-center">
        © 2026 YOUR COMPANY. All Rights Reserved.
    </div>

</body>
</html>

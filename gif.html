<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시안 저장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        /* 캡처 영역을 700px로 고정하고 상대 위치 지정 */
        #capture-area { position: relative; width: 700px; background-color: white; margin-top: 20px; }
        /* 글씨를 이미지 위에 얹기 위한 절대 위치 설정 */
        .watermark { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="w-[700px] mt-6 flex justify-end">
        <button onclick="saveImage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">
            워터마크 포함 저장
        </button>
    </div>

    <div id="capture-area">
        <img id="main-image" src="" style="width: 700px; display: block;">
        <div class="watermark">YOUR COMPANY</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            document.getElementById('main-image').src = `https://sowonnamoo1005.cafe24.com/1/${code}.jpg?t=${Date.now()}`;
        }

        function saveImage() {
            const area = document.getElementById('capture-area');
            
            // html2canvas 옵션: 외부 이미지를 강제로 허용
            html2canvas(area, {
                width: 700,
                windowWidth: 700,
                useCORS: true, 
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${code}_watermark.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>

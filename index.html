<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문작성 게시판 (PC 전용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 추가: input 테두리 스타일 */
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            outline: none;
        }
        .form-input:focus { border-color: #9ca3af; }
    </style>
</head>
<body class="bg-white">

    <div class="w-[744px] mx-auto min-h-screen">
        <header class="w-full flex justify-center pb-4">
            <img src="https://sowonnamoo1005.cafe24.com/web/upload/2025/260602.jpg?234234" width="744" height="68" border="0" usemap="#Map" class="object-cover" onerror="this.style.display='none';">
            <map name="Map">
                <area shape="rect" coords="0,-1,211,57" href="https://sowonnamoo.github.io/myboard" target="_self">
                <area shape="rect" coords="211,-1,383,55" href="https://sowonnamoo1005.cafe24.com/front/php/b/board_list.php?board_no=7" target="_self">
                <area shape="rect" coords="383,-1,572,58" href="https://isecogr.cafe24.com/front/php/b/board_list.php?board_no=1002" target="_self">
                <area shape="rect" coords="572,-3,742,58" href="https://sowonnamoo1004.cafe24.com/front/php/b/board_list.php?board_no=1" target="_self">
            </map>
        </header>

        <div class="py-0">
            <section id="view-list" class="space-y-4">
                <div class="border p-3 bg-gray-50 text-sm text-gray-600 rounded">
                    🎁 <strong>주문작성 게시판</strong> &nbsp;로그인 없이 접수가능합니다.
                </div>
                <table class="w-full text-sm border-t-2 border-gray-400 border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 border-b">
                            <th class="py-3 px-4 text-left">제목</th>
                            <th class="py-3 w-28 text-center">작성자</th>
                            <th class="py-3 w-32 text-center">작성일</th>
                        </tr>
                    </thead>
                    <tbody id="list-body" class="divide-y"></tbody>
                </table>
                <div id="pagination" class="flex justify-center items-center space-x-2 py-4 text-sm font-medium text-gray-600"></div>
                <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                    <div class="flex items-center space-x-2">
                        <input type="text" id="search-author" class="border px-3 py-1.5 text-sm rounded bg-white w-48 focus:border-gray-400 focus:outline-none" placeholder="작성자 이름 검색...">
                        <button id="search-btn" class="bg-gray-600 text-white text-sm px-4 py-1.5 rounded hover:bg-gray-700">검색</button>
                    </div>
                    <button id="go-write-btn" class="bg-blue-600 text-white font-bold text-lg px-12 py-2.5 rounded-full hover:bg-blue-700 transition shadow">글쓰기</button>
                </div>
            </section>

            <section id="view-write" class="hidden w-full">
                <h2 class="text-xl font-bold text-gray-800 mb-6">🔹 주문작성</h2>
                <table class="w-full text-sm border-collapse">
                    <tr><td class="w-28 font-bold text-gray-700 py-3">작성자명 <span class="text-red-500">*</span></td><td><input type="text" id="input-author" class="form-input" placeholder="이름 또는 회사명"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">구입 제품명 <span class="text-red-500">*</span></td><td><input type="text" id="product-name" class="form-input" placeholder="제품명을 입력하세요"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">수량 <span class="text-red-500">*</span></td><td><input type="text" id="quantity" class="form-input"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">사이즈 <span class="text-red-500">*</span></td><td><input type="text" id="size" class="form-input"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">파일1</td><td><input type="file" id="file-1"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">파일2</td><td><input type="file" id="file-2"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3 align-top">작업메시지</td><td><textarea id="message" rows="4" class="form-input resize-none"></textarea></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">접수자핸드폰 <span class="text-red-500">*</span></td><td><input type="text" id="phone" class="form-input" placeholder="010-XXXX-XXXX"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">배송지 <span class="text-red-500">*</span></td><td><input type="text" id="address" class="form-input"></td></tr>
                    <tr><td class="font-bold text-gray-700 py-3">비밀번호 <span class="text-red-500">*</span></td>
                        <td class="flex items-center space-x-2 py-2">
                            <input type="text" id="password" class="form-input" style="-webkit-text-security: disc;" maxlength="4" placeholder="휴대폰 뒷자리 4자리">
                        </td>
                    </tr>
                </table>
                <div class="flex justify-between items-center mt-6">
                    <button onclick="switchView('list')" class="border px-4 py-1.5 text-sm rounded bg-gray-50 hover:bg-gray-100">목록</button>
                    <button id="save-btn" class="bg-gray-600 text-white font-semibold px-8 py-1.5 text-sm rounded hover:bg-gray-700">저장하기</button>
                </div>
            </section>
        </div>
    </div>

    <div id="password-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-80 shadow-xl text-center">
            <h3 class="text-base font-bold text-gray-800 mb-2">🔒 비밀글 열람</h3>
            <p class="text-xs text-gray-500 mb-4">비밀번호(휴대폰 뒷자리 4자리)를 입력하세요.</p>
            <input type="text" id="modal-password-input" class="form-input text-center mb-4" maxlength="4" style="-webkit-text-security: disc;" placeholder="••••">
            <div class="flex gap-2 text-sm font-medium">
                <button id="modal-cancel-btn" class="flex-1 py-2 bg-gray-100 rounded">취소</button>
                <button id="modal-confirm-btn" class="flex-1 py-2 bg-blue-600 text-white rounded">확인</button>
            </div>
        </div>
    </div>

    <div id="loading-spinner" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
        <div class="bg-[#f0ece2] p-8 rounded-lg shadow-xl text-center w-80">
            <p id="loading-text" class="font-bold text-gray-800 text-lg mb-2">파일 접수중...</p>
            <p class="text-xs text-gray-500 mb-4">(10MB 기준 50~100초 소요)</p>
            <div class="w-full bg-black h-5 rounded-sm overflow-hidden">
                <div id="red-progress-bar" class="bg-red-600 h-full w-0" style="transition: width 0.5s linear;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

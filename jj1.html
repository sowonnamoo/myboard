<button onclick="goToWrite('스티커 A세트', '100', '50x50mm', '15000')">구입하기</button>

<script>
function goToWrite(product, qty, size, price) {
    // 메인 글쓰기 페이지로 정보를 쿼리스트링으로 전달
    const url = `index.html?product=${encodeURIComponent(product)}&qty=${encodeURIComponent(qty)}&size=${encodeURIComponent(size)}&price=${encodeURIComponent(price)}`;
    window.location.href = url;
}
</script>

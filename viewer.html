<!DOCTYPE html>
<html>
<body style="margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#333;">
    <div style="position:relative; display:inline-block;">
        <img id="view-img" src="" style="max-width:100%;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); 
                    font-size:50px; color:rgba(255,255,255,0.3); pointer-events:none; font-weight:bold; 
                    text-transform:uppercase; transform:translate(-50%, -50%) rotate(-30deg);">
            COPYRIGHT
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('view-img').src = urlParams.get('img');
    </script>
</body>
</html>

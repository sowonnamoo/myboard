<button onclick="addToCart()">장바구니 담기</button>

<script>
window.addToCart = function() {
    // 1. 상품 데이터 정의
    const product = {
        item: "명함 인쇄",
        width: 90,
        height: 50,
        qty: 1,
        hoo: "금박",
        price: 15000 
    };

    try {
        // 2. localStorage에서 기존 장바구니 가져오기
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        // 3. 상품 추가
        cart.push(product);
        
        // 4. 저장 (제대로 저장되었는지 확인)
        localStorage.setItem("cart", JSON.stringify(cart));
        
        // 5. 성공 확인 및 페이지 이동
        alert("장바구니에 담겼습니다!");
        window.location.href = "index5.html"; // 자동으로 이동
        
    } catch (e) {
        console.error("장바구니 저장 에러:", e);
        alert("저장 중 문제가 발생했습니다.");
    }
};
</script>

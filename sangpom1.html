<!DOCTYPE html>
<html lang="ko">
<body>
    <button onclick="addToCart()">장바구니 담기</button>
    <script>
    function addToCart() {
        const product = {
            productName: "테스트 명함",
            gaa: 90,
            seee: 50,
            quantity: 1,
            price: 15000,
            hoo: "금박",
            file1Url: "",
            file2Url: ""
        };
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push(product);
        localStorage.setItem("cart", JSON.stringify(cart));
        location.href = "index5.html";
    }
    </script>
</body>
</html>

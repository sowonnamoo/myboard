<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 테스트 페이지</title>
</head>
<body>

    <button onclick="addToCart()">장바구니 담기</button>

    <script>
    function addToCart() {
        // 1. 상품 데이터 생성
        const product = {
            item: "테스트 명함",
            width: 90,
            height: 50,
            qty: 1,
            price: 15000
        };

        // 2. localStorage 읽기
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        // 3. 상품 추가
        cart.push(product);
        
        // 4. localStorage 저장
        localStorage.setItem("cart", JSON.stringify(cart));
        
        // 5. 확인 및 이동
        alert("장바구니 담김!");
        location.href = "index5.html"; 
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Photoshop (Final)</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #f0f0f0; font-family: sans-serif; padding-bottom: 80px; }
        #toolbar { margin: 10px; padding: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; align-items: center; }
        canvas { background: white; border: 2px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.2); cursor: crosshair; width: 744px; }
        .text-cursor { cursor: text !important; }
        .btn-container { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .action-btn { padding: 15px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        #undoBtn { background: #6c757d; }
        #fileBtn { background: #28a745; }
        #saveBtn { background: #007bff; }
    </style>
</head>
<body>

<div id="toolbar">
    <button onclick="setMode('draw')">돼지꼬리</button>
    <button id="textBtn" onclick="activateTextMode()">글자</button>
    <button onclick="setMode('circle')">원형</button>
    <button onclick="setMode('square')">사각형</button>
    <label>굵기:</label>
    <input type="number" id="sizeInput" value="5" style="width: 50px;">
    <input type="color" id="colorPicker" value="#ff0000">
</div>

<canvas id="canvas" width="2976" height="2400"></canvas>
<input type="file" id="imageLoader" accept="image/*" style="display:none;">

<div class="btn-container">
    <button id="undoBtn" class="action-btn" onclick="undo()">실행취소</button>
    <button id="fileBtn" class="action-btn" onclick="document.getElementById('imageLoader').click()">이미지 불러오기</button>
    <button id="saveBtn" class="action-btn" onclick="saveImage()">저장하기</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const SCALE = 4;
    let mode = 'draw', drawing = false, startX, startY, snapshot;
    let history = [];

    // 채도 -29% 적용 (무채색 제외)
    function getDesaturatedColor(hex) {
        let r = parseInt(hex.slice(1, 3), 16) / 255;
        let g = parseInt(hex.slice(3, 5), 16) / 255;
        let b = parseInt(hex.slice(5, 7), 16) / 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        if (max === min) return hex;
        let h, s, l = (max + min) / 2;
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
        s = Math.max(0, s - 0.29);
        return `hsl(${h * 360}, ${s * 100}%, ${l * 100}%)`;
    }

    function saveState() {
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (history.length > 20) history.shift();
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            ctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    // 이미지 로드 처리 (HTML 외부로 이동)
    document.getElementById('imageLoader').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = 744 * SCALE;
                canvas.height = (744 * (img.height / img.width)) * SCALE;
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                history = [];
                saveState();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 초기화
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveState();

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        startX = (e.clientX - rect.left) * (canvas.width / rect.width);
        startY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if (mode === 'text') {
            const text = prompt("텍스트 입력:");
            if (text) {
                ctx.fillStyle = getDesaturatedColor(document.getElementById('colorPicker').value);
                ctx.font = (document.getElementById('sizeInput').value * 3 * SCALE) + "px Arial";
                ctx.fillText(text, startX, startY);
                saveState();
            }
        } else {
            drawing = true;
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            if (mode === 'draw') ctx.beginPath();
        }
    };

    canvas.onmousemove = (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const curX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const curY = (e.clientY - rect.top) * (canvas.height / rect.height);
        ctx.putImageData(snapshot, 0, 0);
        ctx.strokeStyle = getDesaturatedColor(document.getElementById('colorPicker').value);
        ctx.fillStyle = getDesaturatedColor(document.getElementById('colorPicker').value);
        ctx.lineWidth = document.getElementById('sizeInput').value * SCALE;
        if (mode === 'draw') { ctx.lineTo(curX, curY); ctx

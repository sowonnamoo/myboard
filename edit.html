<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주문정보 수정</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:15px;
}
h3{
    margin-top:0;
}
input{
    width:100%;
    box-sizing:border-box;
    padding:8px;
    margin-bottom:10px;
}
button{
    width:100%;
    height:40px;
    cursor:pointer;
}
</style>
</head>
<body>

<h3>주문정보 수정</h3>

<input id="author" placeholder="성함">
<input id="phone" placeholder="연락처">
<input id="address" placeholder="주소">

<button id="saveBtn">수정완료</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDU8d6Sh-TDNnRd2aA",
    authDomain: "board-291e3.firebaseapp.com",
    projectId: "board-291e3",
    storageBucket: "board-291e3.firebasestorage.app",
    messagingSenderId: "25881766316",
    appId: "1:25881766316:web:c03e118cf26d3fff11b209"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);

const id = params.get("id");

document.getElementById("author").value =
    decodeURIComponent(params.get("author") || "");

document.getElementById("phone").value =
    decodeURIComponent(params.get("phone") || "");

document.getElementById("address").value =
    decodeURIComponent(params.get("address") || "");

document.getElementById("saveBtn").onclick = async () => {

    try {

        await updateDoc(
            doc(db, "boards", id),
            {
                author: document.getElementById("author").value.trim(),
                phone: document.getElementById("phone").value.trim(),
                address: document.getElementById("address").value.trim()
            }
        );

        alert("수정 완료");

        if (window.opener) {
            window.opener.location.reload();
        }

        window.close();

    } catch (e) {
        console.error(e);
        alert("수정 실패 : " + e.message);
    }
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아래 계좌중 1곳에 입금바랍니다</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-[460px] bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">아래 계좌중 1곳에 입금바랍니다.</h2>
            <div class="mt-4 p-3 bg-blue-50 rounded-lg inline-block">
                <p class="text-xs text-blue-600 font-bold">입금하실 금액</p>
                <p id="display-price" class="text-xl font-bold text-blue-900">0원</p>
            </div>
        </div>

        <div class="space-y-4">
            <!-- 계좌 정보는 그대로 유지 -->
            <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-100">
                <div class="flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="w-10 h-10 flex items-center justify-center bg-yellow-500 rounded-full text-white font-bold text-[10px]">KB</div>
                        <div class="ml-3">
                            <p class="text-[11px] text-gray-500">국민은행</p>
                            <p id="kb-acc" class="font-bold text-gray-800">782301-01-547234</p>
                            <p class="text-[10px] text-gray-600 font-semibold">예금주: 에코그래픽스</p>
                        </div>
                    </div>
                    <button onclick="copyToClipboard('kb-acc')" class="text-[10px] bg-white border border-yellow-200 px-2 py-1 rounded hover:bg-yellow-100 transition">복사</button>
                </div>
            </div>

            <div class="p-4 bg-green-50 rounded-xl border border-green-100">
                <div class="flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="w-10 h-10 flex items-center justify-center bg-green-600 rounded-full text-white font-bold text-[10px]">NH</div>
                        <div class="ml-3">
                            <p class="text-[11px] text-gray-500">농협은행</p>
                            <p id="nh-acc" class="font-bold text-gray-800">352-0130-9995-53</p>
                            <p class="text-[10px] text-gray-600 font-semibold">예금주: 최대환</p>
                        </div>
                    </div>
                    <button onclick="copyToClipboard('nh-acc')" class="text-[10px] bg-white border border-green-200 px-2 py-1 rounded hover:bg-green-100 transition">복사</button>
                </div>
            </div>
        </div>

        <div class="mt-8 p-4 bg-gray-50 rounded-lg text-[11px] text-gray-500 leading-relaxed">
            • 결제확인 되시면 시안이 시안게시판에 등록됩니다.<br>
            • 주문서 접수후 5일내 결제되지 않는 주문접수건은 자동 삭제됩니다. 
        </div>

        <button onclick="confirmAndClose()" class="w-full mt-6 py-3 bg-gray-800 text-white font-semibold rounded-xl hover:bg-gray-900 transition">
            확인 (창 닫기)
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const price = urlParams.get('price');
        
        if (price) {
            document.getElementById("display-price").innerText = Number(price).toLocaleString() + "원";
        } else {
            document.getElementById("display-price").innerText = "금액 정보 없음";
        }

        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("계좌번호가 복사되었습니다.");
            });
        }

        function confirmAndClose() {
            alert("무통장 결제로 주문이 접수되었습니다.\n무통장 결제는 3일간 보관되며 결제지연시 주문삭제 됩니다.");
            window.close();
        }
    </script>
</body>
</html>
